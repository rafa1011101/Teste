}

function groundYBelow(wx, wy) {
  var c = Math.floor(wx / TS);
  for (var r = Math.max(0, Math.floor(wy / TS)); r < ROWS; r++) {
    if (isSolid(tileAt(c, r))) return r * TS;
  }
  return -1;
}
function drawShadow(wx, footY, w) {
  var gy = groundYBelow(wx, footY - 4);
  if (gy < 0) return;
  var d = Math.min(1, Math.max(0.1, 1 - (gy - footY) / 170));
  ctx.fillStyle = 'rgba(15,30,10,' + (0.26 * d).toFixed(3) + ')';
  ctx.beginPath();
  ctx.ellipse(wx - camX, gy + 4, w * (0.45 + 0.35 * d), 1.5 + 4 * d, 0, 0, 7);
  ctx.fill();
}

function drawWater() {
  // água nos buracos
  if (!waterCols.length) return;
  ctx.save();
  var surf = 13 * TS + 10;
  waterCols.forEach(function(c){
    var x = c * TS - camX;
    if (x < -TS || x > GW) return;
    var g = ctx.createLinearGradient(0, surf, 0, GH);
    g.addColorStop(0, '#3f8fd4');
    g.addColorStop(1, '#175a9e');
    ctx.fillStyle = g;
    ctx.fillRect(x, surf, TS + 1, GH - surf);
    // onda
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    var w = Math.sin(frameCount * 0.08 + c) * 3;
    ctx.fillRect(x, surf - 2 + w * 0.4, TS + 1, 3);
    // reflexos e cintilação
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.fillRect(x + 4, surf + 16 + Math.sin(frameCount * 0.05 + c * 1.3) * 5, TS - 8, 2);
    ctx.fillStyle = 'rgba(180,225,255,0.14)';
    ctx.fillRect(x + 8, surf + 38 + Math.cos(frameCount * 0.04 + c * 0.9) * 7, TS - 14, 2);
  });
  ctx.restore();
}

function drawTile(c, r) {
  var t = grid[r][c];
  if (!t) return;
  var x = c * TS - camX, y = r * TS;
  if (x < -TS || x > GW) return;

  if (t === 1) { // terra
    ctx.fillStyle = '#8a5a2b';
    ctx.fillRect(x, y, TS, TS);
    ctx.fillStyle = '#77491f';
    ctx.beginPath(); ctx.arc(x + 9, y + 10, 5, 0, 7); ctx.arc(x + 23, y + 20, 6, 0, 7); ctx.arc(x + 12, y + 26, 4, 0, 7); ctx.fill();
  } else if (t === 2) { // grama
    ctx.fillStyle = '#8a5a2b';
    ctx.fillRect(x, y, TS, TS);
    ctx.fillStyle = '#77491f';
    ctx.beginPath(); ctx.arc(x + 20, y + 24, 5, 0, 7); ctx.fill();
    var gg = ctx.createLinearGradient(0, y, 0, y + 13);
    gg.addColorStop(0, '#74e07c');
    gg.addColorStop(0.5, '#4cc257');
    gg.addColorStop(1, '#319644');
    ctx.fillStyle = gg;
    ctx.fillRect(x, y, TS, 13);
    ctx.fillStyle = 'rgba(255,255,255,0.22)';
    ctx.fillRect(x, y, TS, 2);
    // franjas de musgo
    ctx.fillStyle = '#3fae4e';
    ctx.beginPath();
    ctx.arc(x + 6, y + 12, 5, 0, 7);
    ctx.arc(x + 17, y + 13, 6, 0, 7);
    ctx.arc(x + 27, y + 12, 5, 0, 7);
    ctx.fill();
  } else if (t === 3) { // tijolo
    ctx.fillStyle = '#b3622f';
    ctx.fillRect(x, y, TS, TS);
    ctx.fillStyle = '#8f4c22';
    ctx.fillRect(x, y + 14, TS, 3);
    ctx.fillRect(x + 15, y, 3, 14);
    ctx.fillRect(x + 7, y + 17, 3, 15);
    ctx.fillRect(x + 23, y + 17, 3, 15);
    ctx.strokeStyle = '#7c3f1b'; ctx.lineWidth = 2;
    ctx.strokeRect(x + 1, y + 1, TS - 2, TS - 2);
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.fillRect(x + 1, y + 1, TS - 2, 4);
  } else if (t === 4) { // bloco ?
    var pulse = 1 + Math.sin(frameCount * 0.1) * 0.06;
    ctx.fillStyle = '#f4b400';
    ctx.fillRect(x, y, TS, TS);
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.fillRect(x + 1, y + 1, TS - 2, 5);
    ctx.strokeStyle = '#a86f00'; ctx.lineWidth = 3;
    ctx.strokeRect(x + 2, y + 2, TS - 4, TS - 4);
    ctx.fillStyle = '#8a5a00';
    ctx.beginPath(); ctx.arc(x+5, y+5, 2, 0, 7); ctx.arc(x+TS-5, y+5, 2, 0, 7); ctx.arc(x+5, y+TS-5, 2, 0, 7); ctx.arc(x+TS-5, y+TS-5, 2, 0, 7); ctx.fill();
    ctx.fillStyle = '#7c4a00';
    ctx.font = 'bold ' + Math.round(20 * pulse) + 'px Arial';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('?', x + TS/2, y + TS/2 + 1);
  } else if (t === 8) { // bloco ? de power-up (tom avermelhado, brilha)
    var pl2 = 0.5 + 0.5 * Math.sin(frameCount * 0.15);
    ctx.fillStyle = '#e5622a';
    ctx.fillRect(x, y, TS, TS);
    ctx.fillStyle = 'rgba(255,220,150,' + (0.3 + 0.4*pl2) + ')';
    ctx.fillRect(x + 1, y + 1, TS - 2, 5);
    ctx.strokeStyle = '#a83c12'; ctx.lineWidth = 3;
    ctx.strokeRect(x + 2, y + 2, TS - 4, TS - 4);
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(x+5, y+5, 2, 0, 7); ctx.arc(x+TS-5, y+5, 2, 0, 7); ctx.arc(x+5, y+TS-5, 2, 0, 7); ctx.arc(x+TS-5, y+TS-5, 2, 0, 7); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 20px Arial';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('?', x + TS/2, y + TS/2 + 1);
  } else if (t === 5) { // bloco usado
    ctx.fillStyle = '#9b6a3c';
    ctx.fillRect(x, y, TS, TS);
    ctx.strokeStyle = '#7c4f28'; ctx.lineWidth = 3;
    ctx.strokeRect(x + 2, y + 2, TS - 4, TS - 4);
  } else if (t === 6 || t === 7) { // cano
    var isRim = (t === 7);
    var leftCol = !isSolid(tileAt(c-1, r)) || (tileAt(c-1, r) !== 6 && tileAt(c-1, r) !== 7);
    var g2 = ctx.createLinearGradient(x, y, x + TS, y);
    if (leftCol) { g2.addColorStop(0, '#2f9e3f'); g2.addColorStop(1, '#59d162'); }
    else { g2.addColorStop(0, '#59d162'); g2.addColorStop(1, '#1f7a2f'); }
    ctx.fillStyle = g2;
    if (isRim) {
      ctx.fillRect(x - (leftCol ? 3 : 0), y, TS + 3, TS);
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.fillRect(x - (leftCol ? 3 : 0), y + TS - 5, TS + 3, 5);
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.fillRect(x - (leftCol ? 3 : 0), y + 2, TS + 3, 4);
    } else {
      ctx.fillRect(x, y, TS, TS);
    }
  } else if (t === 9) { // moeda
    var wob = Math.abs(Math.sin(frameCount * 0.08 + c * 0.7));
    var cw = 9 * (0.35 + 0.65 * wob);
    ctx.save();
    ctx.translate(x + TS/2, y + TS/2);
    ctx.fillStyle = '#f6c700';
    ctx.beginPath(); ctx.ellipse(0, 0, cw, 11, 0, 0, 7); ctx.fill();
    ctx.strokeStyle = '#c79300'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.ellipse(0, 0, cw, 11, 0, 0, 7); ctx.stroke();
    ctx.fillStyle = '#c79300';
    ctx.fillRect(-1.5, -6, 3, 12);
    ctx.restore();
  }
}

function drawFlagAndCastle() {
  // mastro da bandeira
  var fx = FLAG_COL * TS - camX, fy = 13 * TS;
  if (fx > -100 && fx < GW + 100) {
    ctx.fillStyle = '#cfd6dd';
    ctx.fillRect(fx - 3, fy - 288, 6, 288);
    ctx.beginPath(); ctx.arc(fx, fy - 292, 8, 0, 7); ctx.fillStyle = '#f6c700'; ctx.fill();
    // bandeira do Brasil
    var flagY = flagReached ? fy - 60 : fy - 276;
    ctx.fillStyle = '#159b3f';
    ctx.fillRect(fx + 3, flagY, 52, 36);
    ctx.fillStyle = '#f6c700';
    ctx.beginPath();
    ctx.moveTo(fx + 29, flagY + 4); ctx.lineTo(fx + 51, flagY + 18); ctx.lineTo(fx + 29, flagY + 32); ctx.lineTo(fx + 7, flagY + 18);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#1450a0';
    ctx.beginPath(); ctx.arc(fx + 29, flagY + 18, 7, 0, 7); ctx.fill();
  }
  // castelo do fim de fase (primeiro plano)
  var cx = CASTLE_COL * TS - camX, cy = 13 * TS;
  if (cx > -260 && cx < GW + 260) {
    ctx.fillStyle = '#a7b0ba';
    ctx.fillRect(cx, cy - 128, 150, 128);
    ctx.fillStyle = '#98a1ab';
    ctx.fillRect(cx + 20, cy - 176, 110, 48);
    for (var i = 0; i < 5; i++) ctx.fillRect(cx + 4 + i * 31, cy - 140, 16, 12);
    for (var j = 0; j < 4; j++) ctx.fillRect(cx + 26 + j * 29, cy - 188, 14, 12);
    // porta
    ctx.fillStyle = '#3a3f46';
    ctx.beginPath();
    ctx.moveTo(cx + 55, cy);
    ctx.lineTo(cx + 55, cy - 52);
    ctx.arc(cx + 75, cy - 52, 20, Math.PI, 0);
    ctx.lineTo(cx + 95, cy);
    ctx.closePath(); ctx.fill();
    // janela
    ctx.fillStyle = '#3a3f46';
    ctx.fillRect(cx + 66, cy - 160, 18, 24);
    // telhado torre central + bandeira vermelha
    ctx.fillStyle = '#d64533';
    ctx.beginPath(); ctx.moveTo(cx + 52, cy - 176); ctx.lineTo(cx + 75, cy - 214); ctx.lineTo(cx + 98, cy - 176); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#555'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(cx + 75, cy - 214); ctx.lineTo(cx + 75, cy - 238); ctx.stroke();
    ctx.fillStyle = '#e33';
    ctx.beginPath(); ctx.moveTo(cx + 75, cy - 238); ctx.lineTo(cx + 98, cy - 231); ctx.lineTo(cx + 75, cy - 224); ctx.closePath(); ctx.fill();
  }
}

// ---------- Personagem: FRANGORILLA ----------
function drawFrangorilla(px, py, facing, walkT, onGround, inv, dead, sx, sy, w, h, power, grow) {
  if (inv > 0 && Math.floor(inv / 6) % 2 === 0 && !dead) return; // pisca
  sx = sx || 1; sy = sy || 1; w = w || 26; h = h || 46; power = power || 0;
  var fire = (power === 2);
  var artScale = h / 46;                         // encaixa a arte na altura atual
  var pop = grow ? (1 + 0.14 * Math.sin((24 - grow) / 24 * Math.PI)) : 1;  // "pop" ao crescer
  ctx.save();
  ctx.translate(px + w/2, py + h);   // pivô nos pés, no centro
  if (!dead) ctx.scale(sx, sy);      // squash & stretch
  ctx.scale(artScale * pop, artScale * pop);
  if (dead) { ctx.rotate(Math.PI); }
  if (facing < 0) ctx.scale(-1, 1);
  ctx.translate(-16, -45);
  // respiração sutil quando parado
  if (onGround && walkT === 0 && !dead) ctx.translate(0, Math.sin(frameCount * 0.08) * 0.7);
  // aura de fogo
  if (fire) {
    var fa = 0.25 + 0.15 * Math.sin(frameCount * 0.3);
    ctx.fillStyle = 'rgba(255,140,30,' + fa + ')';
    ctx.beginPath(); ctx.ellipse(16, 20, 20, 26, 0, 0, 7); ctx.fill();
  }
  // agora desenhando em caixa local 32x46
  var legSwing = onGround ? Math.sin(walkT * 2) * 6 : 4;
  var W = 32;

  // --- cauda (penas escuras atrás) ---
  ctx.fillStyle = '#20301c';
  ctx.beginPath();
  ctx.moveTo(4, 20);
  ctx.bezierCurveTo(-10, 12, -12, 0, -4, -2);
  ctx.bezierCurveTo(-8, 8, -2, 14, 6, 16);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#33461f';
  ctx.beginPath();
  ctx.moveTo(5, 22);
  ctx.bezierCurveTo(-8, 18, -10, 6, -2, 4);
  ctx.bezierCurveTo(-6, 12, 0, 18, 8, 19);
  ctx.closePath(); ctx.fill();

  // --- pernas (amarelo-alaranjadas com garras) ---
  function leg(lx, swing) {
    ctx.strokeStyle = '#e09a2b'; ctx.lineWidth = 5; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(lx, 34);
    ctx.lineTo(lx + swing * 0.4, 41);
    ctx.stroke();
    // pé com garras
    ctx.strokeStyle = '#d78d1f'; ctx.lineWidth = 3;
    var fx = lx + swing * 0.4, fy = 44;
    ctx.beginPath();
    ctx.moveTo(fx, fy - 3); ctx.lineTo(fx + 5, fy);
    ctx.moveTo(fx, fy - 3); ctx.lineTo(fx + 2, fy + 1);
    ctx.moveTo(fx, fy - 3); ctx.lineTo(fx - 3, fy + 1);
    ctx.stroke();
  }
  leg(11, -legSwing);
  leg(21, legSwing);

  // --- shorts (azul; vermelho no modo fogo) ---
  ctx.fillStyle = fire ? '#d63324' : '#1a56c4';
  rr(7, 26, 18, 10, 4); ctx.fill();
  ctx.fillStyle = fire ? '#a11d12' : '#0f3e96';
  ctx.fillRect(15, 26, 2, 10);

  // --- braço de trás (marrom escuro, musculoso) ---
  var armSwing = onGround ? Math.sin(walkT * 2) * 4 : -5;
  ctx.strokeStyle = '#3a2b1a'; ctx.lineWidth = 7; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(9, 17); ctx.lineTo(4 - armSwing * 0.5, 26 - (onGround ? 0 : 8)); ctx.stroke();
  ctx.fillStyle = '#2e2214';
  ctx.beginPath(); ctx.arc(4 - armSwing * 0.5, 27 - (onGround ? 0 : 9), 4.5, 0, 7); ctx.fill();

  // --- torso: camisa da seleção (branca com vermelho no modo fogo) ---
  var jg = ctx.createLinearGradient(0, 12, 0, 29);
  if (fire) { jg.addColorStop(0, '#ffffff'); jg.addColorStop(0.6, '#f4f4f4'); jg.addColorStop(1, '#d9d9d9'); }
  else      { jg.addColorStop(0, '#ffe23a'); jg.addColorStop(0.6, '#f7d417'); jg.addColorStop(1, '#dfae06'); }
  ctx.fillStyle = jg;
  rr(5, 12, 22, 17, 6); ctx.fill();
  ctx.strokeStyle = 'rgba(90,60,0,0.35)'; ctx.lineWidth = 1.4;
  rr(5, 12, 22, 17, 6); ctx.stroke();
  // sombra da camisa
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  rr(5, 22, 22, 7, 4); ctx.fill();
  // gola e mangas (verde; vermelho no modo fogo)
  ctx.fillStyle = fire ? '#d63324' : '#159b3f';
  ctx.fillRect(11, 12, 10, 3);
  ctx.fillRect(5, 16, 3, 5);
  ctx.fillRect(24, 16, 3, 5);
  // escudinho
  ctx.fillStyle = fire ? '#d63324' : '#159b3f';
  ctx.beginPath(); ctx.arc(21, 18, 2.4, 0, 7); ctx.fill();

  // --- braço da frente ---
  ctx.strokeStyle = '#463420'; ctx.lineWidth = 7;
  ctx.beginPath(); ctx.moveTo(23, 17); ctx.lineTo(28 + armSwing * 0.5, 25 - (onGround ? 0 : 10)); ctx.stroke();
  ctx.fillStyle = '#332617';
  ctx.beginPath(); ctx.arc(28 + armSwing * 0.5, 26 - (onGround ? 0 : 11), 4.5, 0, 7); ctx.fill();

  // --- cabeça de galo (creme com penas e volume) ---
  var hg = ctx.createRadialGradient(15, 3, 2, 17, 6, 10);
  hg.addColorStop(0, '#f6efdc');
  hg.addColorStop(0.7, '#e8dcc0');
  hg.addColorStop(1, '#cbb894');
  ctx.fillStyle = hg;
  ctx.beginPath(); ctx.ellipse(17, 6, 8.5, 8, 0, 0, 7); ctx.fill();
  ctx.strokeStyle = 'rgba(110,90,50,0.35)'; ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.ellipse(17, 6, 8.5, 8, 0, 0, 7); ctx.stroke();
  ctx.fillStyle = '#d9c8a4';
  ctx.beginPath(); ctx.ellipse(13, 8, 5, 5.5, 0, 0, 7); ctx.fill();
  // crista vermelha
  ctx.fillStyle = '#d42b1e';
  ctx.beginPath();
  ctx.arc(13, -2, 3.2, 0, 7);
  ctx.arc(17, -3.5, 3.6, 0, 7);
  ctx.arc(21, -2, 3.2, 0, 7);
  ctx.fill();
  // bico
  ctx.fillStyle = '#f0a71c';
  ctx.beginPath();
  ctx.moveTo(24, 5); ctx.lineTo(31, 7.5); ctx.lineTo(24, 10);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#c9820a'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(24, 7.5); ctx.lineTo(30, 7.5); ctx.stroke();
  // barbela
  ctx.fillStyle = '#d42b1e';
  ctx.beginPath(); ctx.ellipse(23, 12, 2.4, 3.4, 0, 0, 7); ctx.fill();
  // olho
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(20.5, 5, 3, 0, 7); ctx.fill();
  ctx.fillStyle = '#20160a';
  ctx.beginPath(); ctx.arc(21.5, 5.2, 1.6, 0, 7); ctx.fill();
  // sobrancelha brava
  ctx.strokeStyle = '#5a4426'; ctx.lineWidth = 1.6;
  ctx.beginPath(); ctx.moveTo(18, 1.6); ctx.lineTo(23.5, 3); ctx.stroke();

  ctx.restore();
}

// ---------- Inimigos ----------
function drawGoomba(en) {
  var x = en.x - camX, y = en.y;
  if (x < -60 || x > GW + 60) return;
  ctx.save();
  if (!en.alive) {
    ctx.translate(x + en.w/2, y + en.h);
    ctx.scale(1.25, Math.max(0.15, 1 - en.squash * 0.1));
    ctx.translate(-(x + en.w/2), -(y + en.h));
  }
  var wob = Math.sin(en.walkT * 3) * 1.5;
  // corpo (cogumelo marrom)
  ctx.fillStyle = '#8a5a2b';
  ctx.beginPath(); ctx.ellipse(x + 14, y + 12 + wob*0.3, 14, 12, 0, 0, 7); ctx.fill();
  ctx.fillStyle = '#a06c36';
  ctx.beginPath(); ctx.ellipse(x + 14, y + 9 + wob*0.3, 12, 8, 0, 0, 7); ctx.fill();
  // pés
  ctx.fillStyle = '#5f3c17';
  ctx.beginPath();
  ctx.ellipse(x + 7 + wob, y + 25, 6, 4, 0, 0, 7);
  ctx.ellipse(x + 21 - wob, y + 25, 6, 4, 0, 0, 7);
  ctx.fill();
  // olhos bravos
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.ellipse(x + 9, y + 11, 3.6, 4.6, 0, 0, 7);
  ctx.ellipse(x + 19, y + 11, 3.6, 4.6, 0, 0, 7);
  ctx.fill();
  ctx.fillStyle = '#20160a';
  ctx.beginPath();
  ctx.arc(x + 10, y + 12.5, 1.8, 0, 7);
  ctx.arc(x + 18, y + 12.5, 1.8, 0, 7);
  ctx.fill();
  // sobrancelhas
  ctx.strokeStyle = '#2e1d09'; ctx.lineWidth = 2.4;
  ctx.beginPath();
  ctx.moveTo(x + 5, y + 5); ctx.lineTo(x + 12, y + 8);
  ctx.moveTo(x + 23, y + 5); ctx.lineTo(x + 16, y + 8);
  ctx.stroke();
  // presas
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.moveTo(x + 9, y + 19); ctx.lineTo(x + 11, y + 16); ctx.lineTo(x + 13, y + 19);
  ctx.moveTo(x + 15, y + 19); ctx.lineTo(x + 17, y + 16); ctx.lineTo(x + 19, y + 19);
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawKoopa(en) {
  var x = en.x - camX, y = en.y;
  if (x < -60 || x > GW + 60) return;
  ctx.save();
  if (!en.alive) {
    ctx.translate(x + en.w/2, y + en.h);
    ctx.scale(1.2, Math.max(0.2, 1 - en.squash * 0.1));
    ctx.translate(-(x + en.w/2), -(y + en.h));
  }
  var dir = en.vx >= 0 ? 1 : -1;
  var wob = Math.sin(en.walkT * 3) * 1.5;
  ctx.translate(x + en.w/2, y);
  if (dir < 0) ctx.scale(-1, 1);
  ctx.translate(-en.w/2, 0);
  // pés
  ctx.fillStyle = '#f0a71c';
  ctx.beginPath();
  ctx.ellipse(8 + wob, 31, 5, 3.5, 0, 0, 7);
  ctx.ellipse(19 - wob, 31, 5, 3.5, 0, 0, 7);
  ctx.fill();
  // casco
  ctx.fillStyle = '#1f8a3c';
  ctx.beginPath(); ctx.ellipse(12, 20, 12, 10, 0, 0, 7); ctx.fill();
  ctx.strokeStyle = '#136328'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.ellipse(12, 20, 12, 10, 0, 0, 7); ctx.stroke();
  // padrão do casco
  ctx.strokeStyle = '#136328'; ctx.lineWidth = 1.6;
  ctx.beginPath();
  ctx.moveTo(4, 16); ctx.lineTo(12, 20); ctx.lineTo(20, 16);
  ctx.moveTo(6, 25); ctx.lineTo(12, 20);
  ctx.moveTo(18, 25); ctx.lineTo(12, 20);
  ctx.stroke();
  // borda do casco
  ctx.fillStyle = '#efe9c8';
  ctx.beginPath(); ctx.ellipse(12, 27, 11, 3.5, 0, 0, 7); ctx.fill();
  // cabeça
  ctx.fillStyle = '#f5d03c';
  ctx.beginPath(); ctx.ellipse(23, 9, 6.5, 6, 0, 0, 7); ctx.fill();
  // olho
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(25, 8, 2.6, 0, 7); ctx.fill();
  ctx.fillStyle = '#20160a';
  ctx.beginPath(); ctx.arc(26, 8, 1.3, 0, 7); ctx.fill();
  ctx.restore();
}

function drawPlant(pl) {
  var x = pl.x - camX;
  if (x < -60 || x > GW + 60) return;
  var out = pl.out || 0;
  if (out <= 0.02) return;
  var h = 42 * out;
  var topY = pl.topY - h;
  ctx.save();
  // caule
  ctx.strokeStyle = '#2f9e3f'; ctx.lineWidth = 6;
  ctx.beginPath(); ctx.moveTo(x, pl.topY); ctx.lineTo(x, topY + 12); ctx.stroke();
  // folhas
  ctx.fillStyle = '#2f9e3f';
  ctx.beginPath();
  ctx.ellipse(x - 7, topY + 24, 7, 3.5, -0.5, 0, 7);
  ctx.ellipse(x + 7, topY + 24, 7, 3.5, 0.5, 0, 7);
  ctx.fill();
  // cabeça vermelha com bolinhas
  var open = (Math.sin(frameCount * 0.15) + 1) / 2;
  ctx.fillStyle = '#d63324';
  ctx.beginPath(); ctx.ellipse(x, topY + 6, 12, 10, 0, 0, 7); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(x - 5, topY + 2, 2.4, 0, 7);
  ctx.arc(x + 5, topY + 4, 2, 0, 7);
  ctx.arc(x, topY + 9, 1.8, 0, 7);
  ctx.fill();
  // boca com dentes
  ctx.fillStyle = '#7c1408';
  ctx.beginPath(); ctx.ellipse(x, topY + 8, 9, 3 + open * 3.5, 0, 0, 7); ctx.fill();
  ctx.fillStyle = '#fff';
  for (var i = -1; i <= 1; i++) {
    ctx.beginPath();
    ctx.moveTo(x + i * 5 - 2, topY + 6 - open);
    ctx.lineTo(x + i * 5, topY + 9);
    ctx.lineTo(x + i * 5 + 2, topY + 6 - open);
    ctx.closePath(); ctx.fill();
  }
  ctx.restore();
}

// ---------- Partículas e popups ----------
function drawPlatforms() {
  movingPlats.forEach(function(p){
    var x = p.x - camX, y = p.y;
    if (x < -120 || x > GW + 120) return;
    // corpo de plataforma metálica com correntes/parafusos
    var g = ctx.createLinearGradient(0, y, 0, y + p.h);
    g.addColorStop(0, '#c9862f'); g.addColorStop(1, '#8a591b');
    ctx.fillStyle = g;
    rr(x, y, p.w, p.h, 5); ctx.fill();
    ctx.strokeStyle = '#5f3c12'; ctx.lineWidth = 2;
    rr(x, y, p.w, p.h, 5); ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.fillRect(x + 3, y + 2, p.w - 6, 2);
    // parafusos
    ctx.fillStyle = '#5f3c12';
    ctx.beginPath();
    ctx.arc(x + 7, y + p.h/2, 1.6, 0, 7); ctx.arc(x + p.w - 7, y + p.h/2, 1.6, 0, 7);
    ctx.fill();
  });
}

function drawSprings() {
  springs.forEach(function(s){
    var x = s.x - camX, y = s.y;
    if (x < -60 || x > GW + 60) return;
    var comp = s.comp * 0.7;                 // compressão
    var topY = y + comp;
    // base
    ctx.fillStyle = '#b03a2e';
    ctx.fillRect(x + 4, y + TS - 6, TS - 8, 6);
    // espiras da mola
    ctx.strokeStyle = '#e0483a'; ctx.lineWidth = 4; ctx.lineCap = 'round';
    var coils = 4, h = (TS - 10) - comp;
    ctx.beginPath();
    for (var i = 0; i <= coils; i++) {
      var yy = topY + 6 + (h) * (i / coils);
      if (i === 0) ctx.moveTo(x + 6, yy); else ctx.lineTo(x + (i % 2 ? TS - 6 : 6), yy);
    }
    ctx.stroke();
    // prato de cima
    ctx.fillStyle = '#c0392b';
    rr(x + 2, topY, TS - 4, 6, 2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fillRect(x + 4, topY + 1, TS - 8, 2);
  });
}

function drawPowerups() {
  powerups.forEach(function(pu){
    var x = pu.x - camX, y = pu.y;
    if (x < -60 || x > GW + 60) return;
    if (pu.kind === 'mush') {
      // cogumelo vermelho de crescimento
      ctx.fillStyle = '#e8ddc4';                     // pé
      rr(x + 5, y + 12, 14, 12, 3); ctx.fill();
      ctx.fillStyle = '#20160a';
      ctx.beginPath(); ctx.arc(x + 9, y + 18, 1.4, 0, 7); ctx.arc(x + 15, y + 18, 1.4, 0, 7); ctx.fill();
      ctx.fillStyle = '#d63324';                     // chapéu
      ctx.beginPath(); ctx.arc(x + 12, y + 11, 12, Math.PI, 0); ctx.fill();
      ctx.fillRect(x, y + 11, 24, 3);
      ctx.fillStyle = '#fff';                         // bolinhas
      ctx.beginPath(); ctx.arc(x + 6, y + 8, 2.6, 0, 7); ctx.arc(x + 18, y + 8, 2.6, 0, 7); ctx.arc(x + 12, y + 4, 3, 0, 7); ctx.fill();
    } else {
      // flor de fogo
      var sway = Math.sin((pu.t || 0) * 0.15) * 2;
      ctx.strokeStyle = '#2f9e3f'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(x + 12, y + 24); ctx.lineTo(x + 12 + sway, y + 12); ctx.stroke();
      var cx = x + 12 + sway, cy = y + 8;
      ctx.fillStyle = '#ff7a1a';
      for (var i = 0; i < 6; i++) {
        var a = i / 6 * Math.PI * 2 + frameCount * 0.05;
        ctx.beginPath(); ctx.ellipse(cx + Math.cos(a)*6, cy + Math.sin(a)*6, 4, 4, 0, 0, 7); ctx.fill();
      }
      ctx.fillStyle = '#ffd21a';
      ctx.beginPath(); ctx.arc(cx, cy, 5, 0, 7); ctx.fill();
      ctx.fillStyle = '#d63324';
      ctx.beginPath(); ctx.arc(cx, cy, 2.4, 0, 7); ctx.fill();
    }
  });
}

function drawFireballs() {
  fireballs.forEach(function(fb){
    var x = fb.x - camX + fb.w/2, y = fb.y + fb.h/2;
    ctx.save();
    ctx.translate(x, y); ctx.rotate(fb.rot);
    ctx.fillStyle = '#ffcf33';
    ctx.beginPath(); ctx.arc(0, 0, 6, 0, 7); ctx.fill();
    ctx.fillStyle = '#ff6a1a';
    ctx.beginPath(); ctx.arc(0, 0, 3.5, 0, 7); ctx.fill();
    ctx.restore();
    // rastro
    ctx.fillStyle = 'rgba(255,150,40,0.35)';
    ctx.beginPath(); ctx.arc(x - fb.vx*1.4, y - fb.vy*0.6, 4, 0, 7); ctx.fill();
  });
}

function drawParticles() {
  particles.forEach(function(p){
    var x = p.x - camX;
    if (p.type === 'coinpop') {
      ctx.save();
      ctx.translate(x, p.y);
      var wob = Math.abs(Math.sin(p.t * 0.4));
      ctx.fillStyle = '#f6c700';
      ctx.beginPath(); ctx.ellipse(0, 0, 8 * (0.3 + 0.7 * wob), 10, 0, 0, 7); ctx.fill();
      ctx.restore();
    } else if (p.type === 'dust') {
      var a = Math.max(0, 1 - p.t / 30);
      ctx.fillStyle = 'rgba(214,196,168,' + (a * 0.85) + ')';
      ctx.beginPath(); ctx.arc(x, p.y, 3 + p.t * 0.12, 0, 7); ctx.fill();
    } else if (p.type === 'star') {
      var sa = Math.max(0, 1 - p.t / 46);
      ctx.save();
      ctx.translate(x, p.y);
      ctx.rotate(p.rot || 0);
      ctx.globalAlpha = sa;
      ctx.fillStyle = '#fff2a0';
      ctx.strokeStyle = '#f6c700'; ctx.lineWidth = 1.5;
      ctx.beginPath();
      for (var i = 0; i < 10; i++) {
        var ang = -Math.PI/2 + i * Math.PI/5;
        var rad = i % 2 === 0 ? 6 : 2.6;
        var mx = Math.cos(ang) * rad, my = Math.sin(ang) * rad;
        if (i === 0) ctx.moveTo(mx, my); else ctx.lineTo(mx, my);
      }
      ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.restore();
    } else if (p.type === 'debris') {
      var da = Math.max(0, 1 - p.t / 40);
      ctx.save();
      ctx.translate(x, p.y); ctx.rotate(p.rot || 0);
      ctx.globalAlpha = da;
      ctx.fillStyle = '#b3622f';
      ctx.fillRect(-4, -4, 8, 8);
      ctx.fillStyle = '#8f4c22';
      ctx.fillRect(-4, 0, 8, 2);
      ctx.restore();
    }
  });
  ctx.globalAlpha = 1;
  ctx.font = 'bold 14px Arial';
  ctx.textAlign = 'center';
  popups.forEach(function(p){
    ctx.fillStyle = 'rgba(255,255,255,' + Math.max(0, 1 - p.t / 50) + ')';
    ctx.strokeStyle = 'rgba(0,0,0,' + Math.max(0, 0.6 - p.t / 80) + ')';
    ctx.lineWidth = 3;
    ctx.strokeText(p.txt, p.x - camX, p.y);
    ctx.fillText(p.txt, p.x - camX, p.y);
  });
}

// ---------- HUD ----------
function textOutline(txt, x, y, size, fill, align) {
  ctx.font = 'bold ' + size + 'px "Arial Black", Arial, sans-serif';
  ctx.textAlign = align || 'left';
  ctx.textBaseline = 'middle';
  ctx.lineWidth = Math.max(3, size * 0.18);
  ctx.strokeStyle = 'rgba(40,25,5,0.9)';
  ctx.strokeText(txt, x, y);
  ctx.fillStyle = fill;
  ctx.fillText(txt, x, y);
}

function drawMiniHead(x, y, s) {
  // cabecinha do Frangorilla para o HUD
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(s, s);
  ctx.fillStyle = '#f6c700';
  ctx.beginPath(); ctx.arc(0, 0, 13, 0, 7); ctx.fill();
  ctx.strokeStyle = '#159b3f'; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.arc(0, 0, 13, 0, 7); ctx.stroke();
  ctx.fillStyle = '#e8dcc0';
  ctx.beginPath(); ctx.ellipse(0, 1, 7, 7.5, 0, 0, 7); ctx.fill();
  ctx.fillStyle = '#d42b1e';
  ctx.beginPath(); ctx.arc(-3, -7, 2.4, 0, 7); ctx.arc(0, -8.5, 2.6, 0, 7); ctx.arc(3, -7, 2.4, 0, 7); ctx.fill();
  ctx.fillStyle = '#f0a71c';
  ctx.beginPath(); ctx.moveTo(5, 0); ctx.lineTo(10, 2); ctx.lineTo(5, 4); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#20160a';
  ctx.beginPath(); ctx.arc(3, 0, 1.4, 0, 7); ctx.fill();
  ctx.restore();
}

function drawCoinIcon(x, y, s) {
  ctx.save();
  ctx.translate(x, y); ctx.scale(s, s);
  ctx.fillStyle = '#f6c700';
  ctx.beginPath(); ctx.ellipse(0, 0, 8, 10, 0, 0, 7); ctx.fill();
  ctx.strokeStyle = '#c79300'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.ellipse(0, 0, 8, 10, 0, 0, 7); ctx.stroke();
  ctx.fillStyle = '#c79300'; ctx.fillRect(-1.5, -5, 3, 10);
  ctx.restore();
}

function drawStarIcon(x, y, s) {
  ctx.save();
  ctx.translate(x, y); ctx.scale(s, s);
  ctx.fillStyle = '#f6c700';
  ctx.strokeStyle = '#b8860b'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  for (var i = 0; i < 10; i++) {
    var ang = -Math.PI/2 + i * Math.PI/5;
    var rad = i % 2 === 0 ? 10 : 4.5;
    var mx = Math.cos(ang) * rad, my = Math.sin(ang) * rad;
    if (i === 0) ctx.moveTo(mx, my); else ctx.lineTo(mx, my);
  }
  ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.restore();
}

function drawBrazilFlag(x, y, s) {
  ctx.save();
  ctx.translate(x, y); ctx.scale(s, s);
  ctx.fillStyle = '#159b3f'; ctx.fillRect(-15, -10, 30, 20);
  ctx.fillStyle = '#f6c700';
  ctx.beginPath(); ctx.moveTo(0, -8); ctx.lineTo(13, 0); ctx.lineTo(0, 8); ctx.lineTo(-13, 0); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#1450a0';
  ctx.beginPath(); ctx.arc(0, 0, 4, 0, 7); ctx.fill();
  ctx.restore();
}

function pad(n, len) {
  var s = '' + Math.max(0, n | 0);
  while (s.length < len) s = '0' + s;
  return s;
}

function drawHUD() {
  drawMiniHead(34, 32, 1.15);
  textOutline('×' + pad(lives, 2), 56, 32, 22, '#fff');
  drawCoinIcon(34, 68, 1.1);
  textOutline('×' + pad(coins, 2), 56, 68, 22, '#fff');
  drawStarIcon(34, 102, 1.05);
  textOutline('×' + pad(stars, 2), 56, 102, 22, '#fff');

  textOutline(pad(score, 7), GW - 20, 30, 24, '#fff', 'right');
  // relógio
  ctx.save();
  ctx.translate(GW - 120, 64);
  ctx.fillStyle = '#dfe4e8'; ctx.beginPath(); ctx.arc(0, 0, 10, 0, 7); ctx.fill();
  ctx.strokeStyle = '#555'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -6); ctx.moveTo(0, 0); ctx.lineTo(4, 2); ctx.stroke();
  ctx.restore();
  textOutline('' + Math.max(0, timeLeft), GW - 20, 64, 24, '#fff', 'right');

  drawBrazilFlag(40, GH - 28, 1);
  textOutline('MUNDO 1-' + currentLevel + '  ' + (currentLevel === 1 ? 'RIO' : 'CHAPECÓ'), 66, GH - 28, 20, '#fff');

  // indicador de poder
  var pw = player ? player.power : 0;
  var lbl = pw === 0 ? 'NORMAL' : (pw === 1 ? 'GRANDE' : 'FOGO');
  var col = pw === 2 ? '#ff7a1a' : (pw === 1 ? '#57cd63' : '#cfd8e0');
  textOutline('PODER: ' + lbl, GW/2, GH - 28, 18, col, 'center');

  drawMusicBtn();
}

function drawMusicBtn() {
  var b = musicBtn;
  ctx.save();
  ctx.fillStyle = 'rgba(15,35,65,0.45)';
  ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, 7); ctx.fill();
  // alto-falante
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.moveTo(b.x - 9, b.y - 3); ctx.lineTo(b.x - 4, b.y - 3);
  ctx.lineTo(b.x + 1, b.y - 8); ctx.lineTo(b.x + 1, b.y + 8);
  ctx.lineTo(b.x - 4, b.y + 3); ctx.lineTo(b.x - 9, b.y + 3);
  ctx.closePath(); ctx.fill();
  if (musicOn) {
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(b.x + 3, b.y, 6, -0.9, 0.9); ctx.stroke();
    ctx.beginPath(); ctx.arc(b.x + 3, b.y, 10, -0.9, 0.9); ctx.stroke();
  } else {
    ctx.strokeStyle = '#ff6a5e'; ctx.lineWidth = 3; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(b.x + 4, b.y - 6); ctx.lineTo(b.x + 12, b.y + 6); ctx.stroke();
  }
  ctx.restore();
}

function drawTouchControls() {
  if (!isTouchDevice || state !== 'play') return;
  ctx.save();
  ctx.globalAlpha = 0.4;
  function circleBtn(b, active) {
    ctx.fillStyle = active ? 'rgba(255,255,255,0.75)' : 'rgba(255,255,255,0.35)';
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, 7); ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.35)'; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, 7); ctx.stroke();
  }
  circleBtn(btnL, touchState.left);
  circleBtn(btnR, touchState.right);
  circleBtn(btnJ, touchState.jump);
  var hasFire = player && player.power === 2;
  if (hasFire) {
    ctx.fillStyle = touchState.fire ? 'rgba(255,140,40,0.85)' : 'rgba(255,120,30,0.55)';
    ctx.beginPath(); ctx.arc(btnF.x, btnF.y, btnF.r, 0, 7); ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.35)'; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.arc(btnF.x, btnF.y, btnF.r, 0, 7); ctx.stroke();
  }
  ctx.globalAlpha = 0.85;
  ctx.fillStyle = '#1c3b57';
  // seta esquerda
  ctx.beginPath();
  ctx.moveTo(btnL.x + 14, btnL.y - 20); ctx.lineTo(btnL.x - 18, btnL.y); ctx.lineTo(btnL.x + 14, btnL.y + 20);
  ctx.closePath(); ctx.fill();
  // seta direita
  ctx.beginPath();
  ctx.moveTo(btnR.x - 14, btnR.y - 20); ctx.lineTo(btnR.x + 18, btnR.y); ctx.lineTo(btnR.x - 14, btnR.y + 20);
  ctx.closePath(); ctx.fill();
  // botão de pulo
  ctx.font = 'bold 26px Arial';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('PULO', btnJ.x, btnJ.y);
  // botão de fogo
  if (hasFire) {
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 20px Arial';
    ctx.fillText('FOGO', btnF.x, btnF.y);
  }
  ctx.restore();
}

// ---------- Telas ----------
function drawLogo(cy) {
  var word = 'FRANGORILLA';
  var colors = ['#d63324','#2f9e3f','#f4b400','#1a56c4','#d63324','#2f9e3f','#f4b400','#1a56c4','#d63324','#2f9e3f','#f4b400'];
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  var size = 62;
  ctx.font = 'bold ' + size + 'px "Arial Black", Arial, sans-serif';
  var total = 0, widths = [];
  for (var i = 0; i < word.length; i++) { var w = ctx.measureText(word[i]).width * 0.92; widths.push(w); total += w; }
  var x = GW/2 - total/2;
  for (var j = 0; j < word.length; j++) {
    var wob = Math.sin(frameCount * 0.06 + j * 0.7) * 4;
    ctx.lineWidth = 10; ctx.strokeStyle = '#3a2410';
    ctx.strokeText(word[j], x + widths[j]/2, cy + wob);
    ctx.fillStyle = colors[j];
    ctx.fillText(word[j], x + widths[j]/2, cy + wob);
    x += widths[j];
  }
  // faixa de madeira com subtítulo
  var bw = 420, bh = 46, bx = GW/2 - bw/2, by = cy + 46;
  ctx.fillStyle = '#7c4a22';
  rr(bx, by, bw, bh, 12); ctx.fill();
  ctx.strokeStyle = '#5a3315'; ctx.lineWidth = 4;
  rr(bx, by, bw, bh, 12); ctx.stroke();
  textOutline('AVENTURA NO BRASIL', GW/2, by + bh/2 + 1, 24, '#f6c700', 'center');
}

function drawTitle() {
  drawBackground();
  // chão decorativo
  for (var c = 0; c < Math.ceil(GW/TS) + 1; c++) {
    var x = c * TS;
    ctx.fillStyle = '#8a5a2b'; ctx.fillRect(x, GH - TS, TS, TS);
    ctx.fillStyle = '#3fae4e'; ctx.fillRect(x, GH - TS, TS, 12);
    ctx.fillStyle = '#57cd63'; ctx.fillRect(x, GH - TS, TS, 6);
  }
  drawLogo(150);
  // personagem grande pulando
  ctx.save();
  ctx.translate(GW/2 - 40, 300 + Math.sin(frameCount * 0.05) * 12);
  ctx.scale(2.4, 2.4);
  drawFrangorilla(0, 0, 1, 0, false, 0, false);
  ctx.restore();
  var blink = Math.floor(frameCount / 35) % 2 === 0;
  if (blink) textOutline(isTouchDevice ? 'TOQUE PARA COMEÇAR' : 'PRESSIONE ENTER OU TOQUE PARA COMEÇAR', GW/2, 470, 26, '#fff', 'center');
  textOutline('Setas / A-D: andar    Espaço / W: pular    M: música', GW/2, 512, 16, '#dfe9f5', 'center');
  drawMusicBtn();
}

function drawEndScreen(title, subtitle, color) {
  ctx.fillStyle = 'rgba(10,25,45,0.65)';
  ctx.fillRect(0, 0, GW, GH);
  textOutline(title, GW/2, 200, 56, color, 'center');
  textOutline(subtitle, GW/2, 270, 24, '#fff', 'center');
  textOutline('PONTOS: ' + pad(score, 7) + '   MOEDAS: ' + coins, GW/2, 330, 24, '#f6c700', 'center');
  var blink = Math.floor(frameCount / 35) % 2 === 0;
  if (blink) textOutline(isTouchDevice ? 'Toque para jogar de novo' : 'Enter ou toque para jogar de novo', GW/2, 410, 22, '#fff', 'center');
}

function draw() {
  ctx.clearRect(0, 0, GW, GH);

  if (state === 'title') { drawTitle(); return; }

  ctx.save();
  if (shakeMag > 0.1) {
    ctx.translate((Math.random()-0.5) * shakeMag * 2, (Math.random()-0.5) * shakeMag * 2);
  }

  drawBackground();
  drawWater();

  // tiles visíveis
  var c0 = Math.max(0, Math.floor(camX / TS) - 1);
  var c1 = Math.min(COLS - 1, Math.ceil((camX + GW) / TS) + 1);
  // extensão de terra abaixo do chão até a base da tela
  for (var ce = c0; ce <= c1; ce++) {
    if (grid[14][ce] === 1) {
      ctx.fillStyle = '#77491f';
      ctx.fillRect(ce * TS - camX, ROWS * TS, TS + 1, GH - ROWS * TS);
    }
  }
  for (var r = 0; r < ROWS; r++) {
    for (var c = c0; c <= c1; c++) drawTile(c, r);
  }

  drawFlagAndCastle();
  drawSprings();
  drawPlatforms();
  plants.forEach(drawPlant);
  drawPowerups();
  // sombras no chão (profundidade)
  enemies.forEach(function(en){
    if (en.alive) drawShadow(en.x + en.w/2, en.y + en.h, en.w);
  });
  if (!player.dead) drawShadow(player.x + player.w/2, player.y + player.h, player.w + 6);
  enemies.forEach(function(en){
    if (en.type === 'goomba') drawGoomba(en); else drawKoopa(en);
  });
  drawFireballs();
  drawFrangorilla(player.x - camX, player.y, player.facing, player.walkT, player.onGround, player.inv, player.dead, player.sx, player.sy, player.w, player.h, player.power, player.grow);
  drawParticles();
  // vinheta sutil de profundidade
  var vg = ctx.createRadialGradient(GW/2, GH/2, GH*0.55, GW/2, GH/2, GH*1.0);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(8,20,42,0.20)');
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, GW, GH);
  ctx.restore();   // fim do tremor (HUD não treme)
  drawHUD();
  drawTouchControls();

  if (state === 'win') drawEndScreen('FASE CONCLUÍDA!', 'O Frangorilla chegou ao castelo! Cocoricó!', '#57cd63');
  if (state === 'gameover') drawEndScreen('FIM DE JOGO', 'O Brasil precisa de você... tente de novo!', '#e84c3d');
}

// ---------- Loop principal ----------
var last = 0, acc = 0, STEP = 1000/60;
function loop(ts) {
  requestAnimationFrame(loop);
  if (!last) last = ts;
  var dt = Math.min(ts - last, 100);
  last = ts;
  acc += dt;
  while (acc >= STEP) {
    update();
    acc -= STEP;
  }
  tickMusic();
  draw();
}
requestAnimationFrame(loop);
</script>
</body>
