<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>Frangorilla - Aventura no Brasil</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%; overflow:hidden;
    background:#0a3d62;
    touch-action:none;
    -webkit-user-select:none; user-select:none;
    -webkit-touch-callout:none;
    position:fixed;
  }
  #game {
    display:block;
    position:absolute;
    left:50%; top:50%;
    transform:translate(-50%,-50%);
    image-rendering:auto;
    background:#4aa8e0;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
"use strict";

/* ============================================================
   FRANGORILLA - AVENTURA NO BRASIL
   Jogo de plataforma estilo Mario - roda na web e no iPhone
   Controles: setas/A-D para andar, espaço/W/seta-cima para pular
   No celular: botões de toque na tela
   ============================================================ */

// ---------- Configuração básica ----------
var GW = 960, GH = 540;              // resolução interna do jogo
var TS = 32;                          // tamanho do tile
var canvas = document.getElementById('game');
var ctx = canvas.getContext('2d');
var dpr = Math.min(window.devicePixelRatio || 1, 2);

function resize() {
  var ww = window.innerWidth, wh = window.innerHeight;
  var scale = Math.min(ww / GW, wh / GH);
  canvas.style.width  = (GW * scale) + 'px';
  canvas.style.height = (GH * scale) + 'px';
  canvas.width  = GW * dpr;
  canvas.height = GH * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', function(){ setTimeout(resize, 200); });
resize();

// ---------- Áudio (WebAudio, sem arquivos externos) ----------
var actx = null;
function initAudio() {
  if (!actx) {
    try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  if (actx && actx.state === 'suspended') actx.resume();
}
function beep(freq, dur, type, vol, slideTo) {
  if (!actx) return;
  try {
    var o = actx.createOscillator(), g = actx.createGain();
    o.type = type || 'square';
    o.frequency.setValueAtTime(freq, actx.currentTime);
    if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, actx.currentTime + dur);
    g.gain.setValueAtTime(vol || 0.08, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
    o.connect(g); g.connect(actx.destination);
    o.start(); o.stop(actx.currentTime + dur);
  } catch(e) {}
}
// rajada de ruído filtrado (passos, baque, "squish")
function noiseBurst(dur, freq, type, vol, slideTo) {
  if (!actx) return;
  try {
    var s = actx.createBufferSource(); s.buffer = getNoise();
    var f = actx.createBiquadFilter(); f.type = type || 'lowpass';
    f.frequency.setValueAtTime(freq, actx.currentTime);
    if (slideTo) f.frequency.exponentialRampToValueAtTime(slideTo, actx.currentTime + dur);
    var g = actx.createGain();
    g.gain.setValueAtTime(vol, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
    s.connect(f); f.connect(g); g.connect(actx.destination);
    s.start(); s.stop(actx.currentTime + dur);
  } catch(e) {}
}
var stepFlip = 0;
var SFX = {
  jump:  function(){ beep(300, 0.16, 'square', 0.06, 620); beep(450, 0.18, 'triangle', 0.04, 900); noiseBurst(0.06, 1800, 'highpass', 0.03); },
  step:  function(){ stepFlip ^= 1; noiseBurst(0.045, stepFlip ? 900 : 700, 'lowpass', 0.035); beep(stepFlip ? 150 : 120, 0.04, 'triangle', 0.03); },
  land:  function(str){ var v = Math.min(0.12, 0.05 + str * 0.02); noiseBurst(0.11, 500, 'lowpass', v, 120); beep(110, 0.1, 'triangle', v * 0.7, 70); },
  coin:  function(){ beep(988, 0.07, 'square', 0.06); setTimeout(function(){ beep(1319, 0.22, 'square', 0.06, 1560); }, 65); },
  stomp: function(){ noiseBurst(0.14, 2200, 'lowpass', 0.09, 260); beep(400, 0.12, 'square', 0.07, 90); setTimeout(function(){ beep(760, 0.14, 'square', 0.05, 1200); }, 40); },
  hurt:  function(){ beep(400, 0.12, 'square', 0.08, 200); setTimeout(function(){ beep(220, 0.4, 'sawtooth', 0.08, 60); }, 100); },
  bump:  function(){ beep(140, 0.1, 'square', 0.07); noiseBurst(0.05, 400, 'lowpass', 0.04); },
  brick: function(){ noiseBurst(0.18, 1600, 'lowpass', 0.08, 300); beep(220, 0.12, 'square', 0.05, 90); },
  grow:  function(){ [523,659,784,880,1047,1319].forEach(function(f,i){ setTimeout(function(){ beep(f, 0.12, 'square', 0.06); }, i*55); }); },
  fire:  function(){ beep(700, 0.12, 'square', 0.05, 200); noiseBurst(0.08, 3000, 'highpass', 0.03); },
  spring:function(){ beep(300, 0.18, 'square', 0.06, 1200); },
  powerup:function(){ [660,880,1100].forEach(function(f,i){ setTimeout(function(){ beep(f, 0.1, 'triangle', 0.06); }, i*50); }); },
  win:   function(){ [523,659,784,1047,1319].forEach(function(f,i){ setTimeout(function(){ beep(f, 0.28, 'square', 0.07); }, i*130); }); },
  die:   function(){ [494,440,392,330,262].forEach(function(f,i){ setTimeout(function(){ beep(f, 0.2, 'triangle', 0.09); }, i*110); }); },
  cocorico: function(){ [660,880,660,990].forEach(function(f,i){ setTimeout(function(){ beep(f, 0.15, 'square', 0.06); }, i*90); }); }
};

// ---------- Música de fundo (sequenciador chiptune via WebAudio) ----------
var musicOn = true;
var musicStep = 0, musicNext = 0;
var MUSIC_STEP_T = 0.115; // duração de cada semicolcheia (~130 BPM)
var noiseBuf = null;
var _ = null;
// progressão C - Am - F - G, melodia alegre com suingue de choro/samba
var chordBass = [[48, 55], [45, 52], [41, 48], [43, 50]]; // tônica e quinta por compasso
var leadBars = [
  [76,_,79,_,84,_,79,_,81,79,76,_,72,_,_,_],
  [74,_,76,_,72,_,69,_,72,_,76,_,81,_,_,_],
  [81,_,84,_,81,_,77,_,79,_,77,_,74,_,72,_],
  [74,_,71,_,67,_,71,_,74,_,79,_,74,_,71,_]
];
function noteFreq(n) { return 440 * Math.pow(2, (n - 69) / 12); }
function getNoise() {
  if (!noiseBuf) {
    noiseBuf = actx.createBuffer(1, Math.floor(actx.sampleRate * 0.2), actx.sampleRate);
    var d = noiseBuf.getChannelData(0);
    for (var i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  }
  return noiseBuf;
}
function playTone(freq, t, dur, type, vol) {
  var o = actx.createOscillator(), g = actx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(g); g.connect(actx.destination);
  o.start(t); o.stop(t + dur);
}
function playHat(t, vol, dur) {
  var s = actx.createBufferSource(); s.buffer = getNoise();
  var f = actx.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 6500;
  var g = actx.createGain();
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  s.connect(f); f.connect(g); g.connect(actx.destination);
  s.start(t); s.stop(t + dur);
}
function tickMusic() {
  if (!actx || !musicOn) return;
  if (state !== 'play' && state !== 'title') { musicNext = 0; return; }
  var now = actx.currentTime;
  if (musicNext < now) musicNext = now + 0.06;
  while (musicNext < now + 0.25) {
    var s = musicStep % 64;
    var bar = (s / 16) | 0, st = s % 16;
    var L = leadBars[bar][st];
    if (L != null) playTone(noteFreq(L), musicNext, 0.19, 'square', 0.045);
    if (st === 0 || st === 8)  playTone(noteFreq(chordBass[bar][0]), musicNext, 0.22, 'triangle', 0.11);
    if (st === 4 || st === 12) playTone(noteFreq(chordBass[bar][1]), musicNext, 0.22, 'triangle', 0.09);
    if (st % 2 === 0) playHat(musicNext, st % 8 === 0 ? 0.045 : 0.022, 0.04); // chimbal
    if (st === 4 || st === 12) playHat(musicNext, 0.055, 0.1);                // caixa
    if (st === 7 || st === 15) playHat(musicNext, 0.03, 0.05);               // suingue
    musicStep++;
    musicNext += MUSIC_STEP_T;
  }
}

// ---------- Nível (construído por código) ----------
// Tiles: 0 vazio | 1 terra | 2 grama | 3 tijolo | 4 bloco-? | 5 bloco usado
//        6 cano corpo | 7 cano borda | 9 moeda
var COLS = 140, ROWS = 15;
var grid = [];
var enemySpawns = [];   // {x, y, type}
var plantSpawns = [];   // {x (px, centro do cano), y (topo do cano)}
var waterCols = [];     // colunas de água (buracos)
var platSpawns = [];    // plataformas móveis {x,y (px), w(tiles), axis, range(px), spd, phase}
var springSpawns = [];  // molas {c, r} (tile)
var FLAG_COL = 128;
var CASTLE_COL = 132;
var currentLevel = 1;
var NUM_LEVELS = 2;

function buildLevel(n) {
  grid = [];
  enemySpawns = [];
  plantSpawns = [];
  waterCols = [];
  platSpawns = [];
  springSpawns = [];
  for (var r = 0; r < ROWS; r++) {
    grid.push(new Array(COLS).fill(0));
  }
  function ground(x0, x1) {
    for (var x = x0; x <= x1; x++) { grid[13][x] = 2; grid[14][x] = 1; }
  }
  function stack(x, h) { // pilha de blocos sólidos com grama no topo (escadas)
    for (var i = 0; i < h; i++) grid[12 - i][x] = (i === h-1) ? 2 : 1;
    grid[13][x] = 2; grid[14][x] = 1;
  }
  function brick(x, y) { grid[y][x] = 3; }
  function qblock(x, y) { grid[y][x] = 4; }
  function pblock(x, y) { grid[y][x] = 8; }   // bloco ? de power-up (cogumelo/flor)
  function coin(x, y) { grid[y][x] = 9; }
  function pipe(x, h) { // cano de 2 colunas, altura h tiles acima do chão
    for (var i = 0; i < h; i++) {
      var row = 12 - i;
      grid[row][x] = 6; grid[row][x+1] = 6;
      if (i === h-1) { grid[row][x] = 7; grid[row][x+1] = 7; }
    }
  }
  function gap(x0, x1) { for (var x = x0; x <= x1; x++) waterCols.push(x); }
  function plat(cx, cr, w, axis, rangeTiles, spd) {
    platSpawns.push({ x: cx*TS, y: cr*TS, w: w, axis: axis, range: rangeTiles*TS, spd: spd || 0.02, phase: Math.random()*Math.PI*2 });
  }
  function spring(c) { springSpawns.push({ c: c, r: 12 }); }

  if (n === 1) buildFase1(ground, stack, brick, qblock, pblock, coin, pipe, gap, plat, spring);
  else         buildFase2(ground, stack, brick, qblock, pblock, coin, pipe, gap, plat, spring);
}

// ===== FASE 1 — Rio de Janeiro =====
function buildFase1(ground, stack, brick, qblock, pblock, coin, pipe, gap, plat, spring) {
  FLAG_COL = 128; CASTLE_COL = 132;
  // --- Trecho 1 ---
  ground(0, 20);
  brick(7, 9); pblock(8, 9); brick(9, 9);   // 1º bloco dá cogumelo
  coin(12, 8); coin(13, 7); coin(14, 8);
  pipe(17, 2); plantSpawns.push({ x: (17+1)*TS, y: 11*TS });
  enemySpawns.push({ x: 11*TS, y: 12*TS, type: 'goomba' });
  gap(21, 23);

  // --- Trecho 2 ---
  ground(24, 45);
  brick(29, 9); brick(30, 9); qblock(31, 9); brick(32, 9); brick(33, 9);
  enemySpawns.push({ x: 31*TS, y: 8*TS, type: 'koopa' });
  coin(30, 6); coin(31, 5); coin(32, 6);
  enemySpawns.push({ x: 37*TS, y: 12*TS, type: 'goomba' });
  enemySpawns.push({ x: 41*TS, y: 12*TS, type: 'goomba' });
  pblock(39, 9);   // 2º power: flor de fogo (se já estiver grande)
  gap(46, 48);

  // --- Trecho 3 ---
  ground(49, 70);
  pipe(52, 3); plantSpawns.push({ x: (52+1)*TS, y: 10*TS });
  coin(56, 9); coin(57, 8); coin(58, 7); coin(59, 8); coin(60, 9);
  brick(57, 10); qblock(58, 10); brick(59, 10);
  enemySpawns.push({ x: 62*TS, y: 12*TS, type: 'goomba' });
  stack(64, 1); stack(65, 2); stack(66, 3); stack(67, 4);
  gap(71, 73);

  // --- Trecho 4 ---
  ground(74, 95);
  brick(77, 9); brick(78, 9); brick(79, 9); brick(80, 9);
  coin(77, 7); coin(78, 7); coin(79, 7); coin(80, 7);
  enemySpawns.push({ x: 84*TS, y: 12*TS, type: 'goomba' });
  enemySpawns.push({ x: 88*TS, y: 12*TS, type: 'koopa' });
  pipe(91, 2); plantSpawns.push({ x: (91+1)*TS, y: 11*TS });
  gap(96, 97);

  // --- Trecho final ---
  ground(98, COLS-1);
  qblock(101, 9);
  enemySpawns.push({ x: 104*TS, y: 12*TS, type: 'goomba' });
  enemySpawns.push({ x: 107*TS, y: 12*TS, type: 'goomba' });
  stack(110, 1); stack(111, 2); stack(112, 3); stack(113, 4); stack(114, 5);
  coin(111, 6); coin(112, 5); coin(113, 4);
}

// ===== FASE 2 — Chapecó, SC (mais difícil) =====
function buildFase2(ground, stack, brick, qblock, pblock, coin, pipe, gap, plat, spring) {
  FLAG_COL = 130; CASTLE_COL = 134;
  // --- Início: fileira de tijolos quebráveis com bloco ? no meio ---
  ground(0, 14);
  brick(5, 9); brick(6, 9); pblock(7, 9); brick(8, 9); brick(9, 9);   // power-up logo no início
  coin(6, 6); coin(7, 6); coin(8, 6);
  enemySpawns.push({ x: 4*TS, y: 12*TS, type: 'goomba' });
  enemySpawns.push({ x: 10*TS, y: 12*TS, type: 'goomba' });
  pipe(12, 2); plantSpawns.push({ x: (12+1)*TS, y: 11*TS });
  gap(15, 18);                                   // buraco largo

  // --- Plataformas móveis sobre a água ---
  ground(19, 30);
  plat(16, 10, 3, 'h', 0, 0);                    // borda de embarque (parada)
  enemySpawns.push({ x: 22*TS, y: 12*TS, type: 'koopa' });
  brick(24, 9); brick(25, 9); brick(26, 9);
  coin(24, 7); coin(25, 6); coin(26, 7);
  enemySpawns.push({ x: 28*TS, y: 12*TS, type: 'goomba' });
  gap(31, 35);                                   // buraco grande com plataforma móvel
  plat(31, 9, 3, 'v', 2.2, 0.028);               // plataforma que sobe e desce
  plat(34, 8, 3, 'v', 2.2, 0.028);

  // --- Trecho com molas (trampolim) ---
  ground(36, 55);
  spring(39);                                    // mola: pula bem alto
  brick(38, 5); qblock(39, 5); brick(40, 5);     // recompensa lá em cima
  coin(38, 3); coin(39, 3); coin(40, 3);
  enemySpawns.push({ x: 44*TS, y: 12*TS, type: 'goomba' });
  enemySpawns.push({ x: 46*TS, y: 12*TS, type: 'goomba' });
  enemySpawns.push({ x: 48*TS, y: 12*TS, type: 'koopa' });
  pipe(51, 3); plantSpawns.push({ x: (51+1)*TS, y: 10*TS });
  brick(45, 9); brick(46, 9); brick(47, 9);      // tijolos quebráveis no caminho
  gap(56, 60);

  // --- Plataforma móvel horizontal longa ---
  ground(61, 78);
  plat(57, 10, 3, 'h', 0, 0);                    // embarque
  plat(58, 10, 4, 'h', 3.5, 0.02);               // vai e volta sobre o buraco
  enemySpawns.push({ x: 64*TS, y: 12*TS, type: 'koopa' });
  spring(67);
  brick(66, 5); brick(67, 5); pblock(68, 5); brick(69, 5);
  coin(66, 3); coin(67, 3); coin(68, 3); coin(69, 3);
  enemySpawns.push({ x: 72*TS, y: 12*TS, type: 'goomba' });
  enemySpawns.push({ x: 74*TS, y: 12*TS, type: 'goomba' });
  pipe(76, 2); plantSpawns.push({ x: (76+1)*TS, y: 11*TS });
  gap(79, 82);

  // --- Escada + inimigos densos ---
  ground(83, 105);
  stack(85, 1); stack(86, 2); stack(87, 3); stack(88, 4);
  enemySpawns.push({ x: 90*TS, y: 12*TS, type: 'goomba' });
  enemySpawns.push({ x: 92*TS, y: 12*TS, type: 'koopa' });
  enemySpawns.push({ x: 94*TS, y: 12*TS, type: 'goomba' });
  brick(96, 9); qblock(97, 9); brick(98, 9); qblock(99, 9); brick(100, 9);
  coin(96, 7); coin(97, 7); coin(98, 7); coin(99, 7); coin(100, 7);
  pipe(103, 3); plantSpawns.push({ x: (103+1)*TS, y: 10*TS });
  gap(106, 110);                                 // buraco final com plataformas móveis
  plat(106, 9, 3, 'v', 2, 0.03);
  plat(109, 10, 3, 'v', 2, 0.03);

  // --- Reta final até a bandeira ---
  ground(111, COLS-1);
  enemySpawns.push({ x: 114*TS, y: 12*TS, type: 'goomba' });
  enemySpawns.push({ x: 116*TS, y: 12*TS, type: 'koopa' });
  brick(118, 9); brick(119, 9); brick(120, 9);
  stack(122, 1); stack(123, 2); stack(124, 3); stack(125, 4); stack(126, 5);
  coin(123, 6); coin(124, 5); coin(125, 4);
}

function tileAt(c, r) {
  if (c < 0 || c >= COLS) return 1;
  if (r < 0) return 0;
  if (r >= ROWS) return 0;
  return grid[r][c];
}
function isSolid(t) { return (t >= 1 && t <= 8) && t !== 9; }  // 8 = bloco ? de power-up também é sólido

// ---------- Estado do jogo ----------
var state = 'title';   // title | play | win | gameover
var player, enemies, plants, particles, popups;
var movingPlats = [], springs = [], powerups = [], fireballs = [];
var camX = 0;
var score, coins, lives, stars, timeLeft, timeTick;
var worldEndX = COLS * TS;
var flagReached = false;
var winTimer = 0, deadTimer = 0;
var isTouchDevice = false;
var frameCount = 0;
var shakeT = 0, shakeMag = 0;      // tremor de tela
function addShake(mag, dur) { shakeMag = Math.max(shakeMag, mag); shakeT = Math.max(shakeT, dur); }

// dimensões conforme o poder (0 pequeno, 1 grande, 2 fogo)
function playerDims(power) { return power === 0 ? { w: 22, h: 32 } : { w: 26, h: 46 }; }

function newGame() {
  score = 0; coins = 0; lives = 5; stars = 1;
  currentLevel = 1;
  startLevel(0);
}
function startLevel(power) {
  buildLevel(currentLevel);
  timeLeft = currentLevel === 1 ? 328 : 300;
  flagReached = false; winTimer = 0;
  respawn(power || 0);
}
function nextLevel() {
  var keep = player.power;   // mantém o poder ao avançar de fase
  currentLevel++;
  startLevel(keep);
}
function respawn(power) {
  power = power || 0;
  timeLeft = currentLevel === 1 ? 328 : 300;
  var d = playerDims(power);
  player = {
    x: 2*TS, y: 12*TS - d.h, w: d.w, h: d.h,
    vx: 0, vy: 0,
    facing: 1, onGround: false,
    inv: 0, dead: false, walkT: 0,
    sx: 1, sy: 1,        // escala atual (squash & stretch)
    wasAir: false, stepT: 0, blink: 0,
    power: power, grow: 0, fireCd: 0
  };
  shakeT = 0; shakeMag = 0;
  camX = 0;
  enemies = enemySpawns.map(function(s){
    return { x: s.x, y: s.y, w: 28, h: s.type==='koopa' ? 34 : 28,
             vx: -0.7, vy: 0, type: s.type, alive: true, squash: 0, walkT: Math.random()*10 };
  });
  plants = plantSpawns.map(function(s){
    return { x: s.x, topY: s.y, t: Math.random()*Math.PI*2 };
  });
  movingPlats = platSpawns.map(function(s){
    return { x0: s.x, y0: s.y, x: s.x, y: s.y, px: s.x, py: s.y,
             w: s.w * TS, h: 14, axis: s.axis, range: s.range, spd: s.spd, phase: s.phase };
  });
  springs = springSpawns.map(function(s){
    return { x: s.c * TS, y: s.r * TS, w: TS, h: TS, comp: 0 };
  });
  powerups = [];
  fireballs = [];
  particles = [];
  popups = [];
}

// ---------- Entrada ----------
var keys = {};
window.addEventListener('keydown', function(e){
  keys[e.code] = true;
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space'].indexOf(e.code) >= 0) e.preventDefault();
  initAudio();
  if (e.code === 'KeyM' && !e.repeat) musicOn = !musicOn;
  if (state !== 'play' && (e.code === 'Enter' || e.code === 'Space')) startFromMenu();
});
window.addEventListener('keyup', function(e){ keys[e.code] = false; });

// Botões de toque (desenhados no canvas)
var btnL = { x: 78,  y: GH-78, r: 46 };
var btnR = { x: 192, y: GH-78, r: 46 };
var btnJ = { x: GW-88, y: GH-82, r: 56 };
var btnF = { x: GW-176, y: GH-150, r: 40 };   // botão de fogo (só com poder de fogo)
var musicBtn = { x: GW-185, y: 30, r: 18 };
var touchState = { left:false, right:false, jump:false, fire:false };
var activePointers = {};

function canvasPos(e) {
  var rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) / rect.width * GW,
    y: (e.clientY - rect.top) / rect.height * GH
  };
}
function hitBtn(p, b) {
  var dx = p.x - b.x, dy = p.y - b.y;
  return dx*dx + dy*dy <= b.r*b.r*1.45; // área de toque um pouco maior
}
function updateTouchFromPointers() {
  touchState.left = touchState.right = touchState.jump = touchState.fire = false;
  for (var id in activePointers) {
    var p = activePointers[id];
    if (hitBtn(p, btnL)) touchState.left = true;
    if (hitBtn(p, btnR)) touchState.right = true;
    if (hitBtn(p, btnJ)) touchState.jump = true;
    if (player && player.power === 2 && hitBtn(p, btnF)) touchState.fire = true;
  }
}
canvas.addEventListener('pointerdown', function(e){
  e.preventDefault();
  initAudio();
  if (e.pointerType === 'touch') isTouchDevice = true;
  var pos = canvasPos(e);
  if (hitBtn(pos, musicBtn)) { musicOn = !musicOn; return; }
  if (state !== 'play') { startFromMenu(); return; }
  activePointers[e.pointerId] = pos;
  updateTouchFromPointers();
});
canvas.addEventListener('pointermove', function(e){
  if (activePointers[e.pointerId] !== undefined) {
    activePointers[e.pointerId] = canvasPos(e);
    updateTouchFromPointers();
  }
});
function releasePointer(e) {
  delete activePointers[e.pointerId];
  updateTouchFromPointers();
}
canvas.addEventListener('pointerup', releasePointer);
canvas.addEventListener('pointercancel', releasePointer);
canvas.addEventListener('pointerout', releasePointer);
document.addEventListener('gesturestart', function(e){ e.preventDefault(); });

function startFromMenu() {
  if (state === 'title' || state === 'gameover' || state === 'win') {
    newGame();
    state = 'play';
    SFX.cocorico();
  }
}

var input = {
  left:  function(){ return keys['ArrowLeft'] || keys['KeyA'] || touchState.left; },
  right: function(){ return keys['ArrowRight'] || keys['KeyD'] || touchState.right; },
  jump:  function(){ return keys['ArrowUp'] || keys['KeyW'] || keys['Space'] || touchState.jump; },
  fire:  function(){ return keys['KeyF'] || keys['KeyX'] || keys['ShiftLeft'] || keys['ShiftRight'] || touchState.fire; }
};
var jumpHeld = false, jumpBuf = 0, coyote = 0;

// ---------- Física / atualização ----------
var GRAV = 0.55, MAXFALL = 14, SPEED = 3.4, JUMPV = -13.2;

function rectsOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function moveAndCollide(ent, hitBlockCb) {
  // horizontal
  ent.x += ent.vx;
  var c0, c1, r0, r1, c, r;
  if (ent.vx > 0) {
    c = Math.floor((ent.x + ent.w) / TS);
    r0 = Math.floor(ent.y / TS); r1 = Math.floor((ent.y + ent.h - 1) / TS);
    for (r = r0; r <= r1; r++) {
      if (isSolid(tileAt(c, r))) { ent.x = c*TS - ent.w - 0.01; ent.vx = 0; ent.hitWall = 1; break; }
    }
  } else if (ent.vx < 0) {
    c = Math.floor(ent.x / TS);
    r0 = Math.floor(ent.y / TS); r1 = Math.floor((ent.y + ent.h - 1) / TS);
    for (r = r0; r <= r1; r++) {
      if (isSolid(tileAt(c, r))) { ent.x = (c+1)*TS + 0.01; ent.vx = 0; ent.hitWall = -1; break; }
    }
  }
  // vertical
  ent.y += ent.vy;
  ent.onGround = false;
  if (ent.vy > 0) {
    r = Math.floor((ent.y + ent.h) / TS);
    c0 = Math.floor((ent.x+2) / TS); c1 = Math.floor((ent.x + ent.w - 3) / TS);
    for (c = c0; c <= c1; c++) {
      if (isSolid(tileAt(c, r))) { ent.y = r*TS - ent.h - 0.01; ent.vy = 0; ent.onGround = true; break; }
    }
  } else if (ent.vy < 0) {
    r = Math.floor(ent.y / TS);
    c0 = Math.floor((ent.x+2) / TS); c1 = Math.floor((ent.x + ent.w - 3) / TS);
    for (c = c0; c <= c1; c++) {
      if (isSolid(tileAt(c, r))) {
        ent.y = (r+1)*TS + 0.01; ent.vy = 0;
        if (hitBlockCb) hitBlockCb(c, r);
        break;
      }
    }
  }
}

function bumpEnemiesAbove(c, r) {
  // vira/derrota inimigos em cima do bloco batido
  enemies.forEach(function(en){
    if (!en.alive) return;
    if (en.y + en.h <= r*TS + 4 && en.y + en.h >= r*TS - 20 &&
        en.x + en.w > c*TS && en.x < (c+1)*TS) {
      en.alive = false; en.squash = 0; score += 100;
      addStars(en.x + en.w/2, en.y + en.h/2, 5);
      SFX.stomp();
    }
  });
}

function spawnPowerup(c, r) {
  // cogumelo se pequeno; flor de fogo se já estiver grande/fogo
  var kind = player.power === 0 ? 'mush' : 'flower';
  powerups.push({ x: c*TS + 4, y: r*TS, w: 24, h: 24, vx: kind === 'mush' ? 1.2 : 0,
                  vy: 0, kind: kind, rise: TS, t: 0 });
  SFX.coin();
}

function hitBlock(c, r) {
  var t = tileAt(c, r);
  if (t === 4) { // bloco ? de moeda
    grid[r][c] = 5;
    coins++; score += 100;
    SFX.coin();
    particles.push({ type:'coinpop', x: c*TS + TS/2, y: r*TS - 8, vy: -6, t: 0 });
    popups.push({ x: c*TS + TS/2, y: r*TS - 20, txt: '+100', t: 0 });
    bumpEnemiesAbove(c, r);
  } else if (t === 8) { // bloco ? de power-up
    grid[r][c] = 5;
    score += 100;
    spawnPowerup(c, r);
    bumpEnemiesAbove(c, r);
  } else if (t === 3) { // tijolo
    if (player.power > 0) {   // só quebra se estiver grande ou com fogo
      grid[r][c] = 0;
      score += 50;
      SFX.brick();
      addShake(2, 6);
      bumpEnemiesAbove(c, r);
      // estilhaços
      for (var k = 0; k < 4; k++) {
        particles.push({ type:'debris', x: c*TS + (k%2)*16 + 8, y: r*TS + ((k>>1)*16) + 8,
                         vx: (k%2 ? 1 : -1) * (1 + Math.random()), vy: -3 - Math.random()*2, t: 0, rot: Math.random()*6 });
      }
    } else {
      SFX.bump();
      particles.push({ type:'dust', x: c*TS + TS/2, y: (r+1)*TS, vy: 0, t: 0 });
    }
  }
}

function addStars(x, y, n) {
  for (var k = 0; k < n; k++) {
    var ang = (k / n) * Math.PI * 2;
    particles.push({ type:'star', x: x, y: y, vx: Math.cos(ang)*(1.6+Math.random()), vy: Math.sin(ang)*(1.6+Math.random()) - 1, t: 0, rot: Math.random()*6 });
  }
}

function growPlayer() {
  if (player.power >= 2) { score += 1000; popups.push({ x: player.x + player.w/2, y: player.y, txt: '+1000', t: 0 }); return; }
  var newPow = player.power + 1;
  var d = playerDims(newPow);
  player.y = (player.y + player.h) - d.h;   // mantém os pés no chão
  player.w = d.w; player.h = d.h;
  player.power = newPow;
  player.grow = 24;        // animação de "pop"
  score += 1000;
  SFX.grow();
  popups.push({ x: player.x + player.w/2, y: player.y, txt: newPow === 2 ? 'FOGO!' : 'CRESCEU!', t: 0 });
}

function loseLife() {
  if (player.dead) return;
  player.dead = true;
  deadTimer = 0;
  SFX.die();
  lives--;
}

function hurtPlayer() {
  if (player.inv > 0 || player.dead) return;
  if (player.power > 0) {   // encolhe um nível em vez de morrer
    var newPow = player.power - 1;
    var d = playerDims(newPow);
    player.y = (player.y + player.h) - d.h;
    player.w = d.w; player.h = d.h;
    player.power = newPow;
    player.inv = 120;
    SFX.hurt();
    return;
  }
  SFX.hurt();
  lives--;
  if (lives <= 0) {
    player.dead = true;
    deadTimer = 0;
    SFX.die();
  } else {
    player.inv = 120; // ~2s invencível
    player.vy = -7;
    player.vx = -player.facing * 4;
  }
}

function collectCoinsAround() {
  var c0 = Math.floor(player.x / TS), c1 = Math.floor((player.x + player.w) / TS);
  var r0 = Math.floor(player.y / TS), r1 = Math.floor((player.y + player.h) / TS);
  for (var r = r0; r <= r1; r++) {
    for (var c = c0; c <= c1; c++) {
      if (tileAt(c, r) === 9) {
        grid[r][c] = 0;
        coins++; score += 50;
        SFX.coin();
        popups.push({ x: c*TS + TS/2, y: r*TS, txt: '+50', t: 0 });
        if (coins > 0 && coins % 50 === 0) { lives++; SFX.cocorico(); }
      }
    }
  }
}

function updatePlatforms() {
  movingPlats.forEach(function(p){
    p.px = p.x; p.py = p.y;
    if (p.range > 0) {
      p.phase += p.spd;
      var off = Math.sin(p.phase) * p.range;
      if (p.axis === 'h') p.x = p.x0 + off; else p.y = p.y0 + off;
    }
    p.dx = p.x - p.px; p.dy = p.y - p.py;
  });
}

function collidePlatforms(pFeet) {
  player.onPlat = null;
  movingPlats.forEach(function(p){
    var overlapX = player.x + player.w > p.x + 3 && player.x < p.x + p.w - 3;
    if (!overlapX) return;
    var feet = player.y + player.h;
    if (player.vy >= 0 && pFeet <= p.py + 8 && feet >= p.y - 2 && feet <= p.y + 20) {
      player.y = p.y - player.h;
      player.vy = 0; player.onGround = true;
      player.onPlat = p;
    }
  });
  if (player.onPlat) {                    // carrega o jogador junto
    player.x += player.onPlat.dx;
    player.y = player.onPlat.y - player.h;
  }
}

function collideSprings(pFeet) {
  springs.forEach(function(s){
    var overlapX = player.x + player.w > s.x + 3 && player.x < s.x + s.w - 3;
    if (!overlapX) return;
    var feet = player.y + player.h;
    if (player.vy >= 0 && pFeet <= s.y + 8 && feet >= s.y - 2 && feet <= s.y + 22) {
      player.y = s.y - player.h;
      s.comp = 10;
      player.vy = jumpHeld ? -20 : -13.5;   // lançamento (mais alto se segurar pulo)
      player.onGround = false; player.wasAir = true;
      player.sx = 0.7; player.sy = 1.4;
      SFX.spring();
    }
  });
}

function update() {
  frameCount++;
  if (state !== 'play') return;

  // --- vitória / fim de fase em andamento ---
  if (flagReached) {
    winTimer++;
    player.vx = 1.6; player.facing = 1;
    player.vy = Math.min(player.vy + GRAV, MAXFALL);
    player.walkT += 0.2;
    moveAndCollide(player);
    if (winTimer > 150) {
      if (currentLevel < NUM_LEVELS) nextLevel();  // vai pra próxima fase
      else state = 'win';
    }
    return;
  }

  // --- morte em andamento ---
  if (player.dead) {
    deadTimer++;
    player.vy += GRAV * 0.6;
    player.y += player.vy;
    if (deadTimer === 1) player.vy = -9;
    if (deadTimer > 110) {
      if (lives <= 0) { state = 'gameover'; }
      else { respawn(0); }   // renasce pequeno
    }
    return;
  }

  if (player.grow > 0) player.grow--;
  if (player.fireCd > 0) player.fireCd--;

  // --- tempo ---
  timeTick++;
  if (timeTick >= 60) { timeTick = 0; timeLeft--; if (timeLeft <= 0) loseLife(); }

  // --- movimento do jogador ---
  var ax = 0;
  if (input.left())  { ax = -1; player.facing = -1; }
  if (input.right()) { ax = 1;  player.facing = 1; }
  player.vx = ax * SPEED;
  if (ax !== 0 && player.onGround) player.walkT += 0.25; else if (ax === 0) player.walkT = 0;

  // "coyote time": ainda pode pular alguns frames após sair da borda
  if (player.onGround) coyote = 6; else if (coyote > 0) coyote--;
  var jp = input.jump();
  if (jp && !jumpHeld) jumpBuf = 8; // "jump buffer": pulo apertado um pouco antes de aterrissar vale
  if (jumpBuf > 0 && coyote > 0) {
    player.vy = JUMPV;
    jumpBuf = 0; coyote = 0;
    player.sx = 0.7; player.sy = 1.35;   // estica ao decolar
    SFX.jump();
    for (var d = 0; d < 4; d++) particles.push({ type:'dust', x: player.x + player.w/2 + (Math.random()-0.5)*16, y: player.y + player.h - 2, vy: -0.5 - Math.random(), t: 0 });
  }
  if (jumpBuf > 0) jumpBuf--;
  if (jp) {
    jumpHeld = true;
    if (player.vy < -4) player.vy -= 0.12; // segurar = pulo mais alto
  } else {
    jumpHeld = false;
    if (player.vy < -5) player.vy = -5; // soltar = pulo curto
  }

  // --- bola de fogo (só com poder de fogo) ---
  if (player.power === 2 && input.fire() && player.fireCd <= 0 && fireballs.length < 3) {
    fireballs.push({ x: player.x + (player.facing > 0 ? player.w - 4 : -8), y: player.y + player.h * 0.42,
                     w: 12, h: 12, vx: player.facing * 6.5, vy: 2, life: 220, rot: 0 });
    player.fireCd = 16;
    SFX.fire();
  }

  updatePlatforms();

  var pFeet = player.y + player.h;   // pés antes do movimento vertical (p/ plataformas)
  var fallV = player.vy;
  player.vy = Math.min(player.vy + GRAV, MAXFALL);
  moveAndCollide(player, hitBlock);
  collidePlatforms(pFeet);
  collideSprings(pFeet);
  if (player.x < 0) player.x = 0;

  // aterrissagem: achata, levanta poeira, baque sonoro e tremor
  if (player.onGround && player.wasAir) {
    var impact = Math.min(1, fallV / 13);
    if (impact > 0.15) {
      player.sx = 1 + 0.45 * impact; player.sy = 1 - 0.4 * impact;   // achata
      SFX.land(fallV);
      if (impact > 0.4) addShake(2.5 * impact, 8);
      var n = 3 + Math.round(impact * 5);
      for (var l = 0; l < n; l++) {
        particles.push({ type:'dust', x: player.x + player.w/2 + (Math.random()-0.5)*22,
                         y: player.y + player.h - 2, vy: -0.5 - Math.random()*1.2, t: 0 });
      }
    }
  }
  player.wasAir = !player.onGround;

  // molinha do squash/stretch de volta ao normal
  player.sx += (1 - player.sx) * 0.2;
  player.sy += (1 - player.sy) * 0.2;
  // no ar, leve alongamento conforme a velocidade vertical
  if (!player.onGround) {
    var st = Math.max(-0.18, Math.min(0.18, -player.vy * 0.012));
    player.sy += (1 + st - player.sy) * 0.15;
    player.sx += (1 - st - player.sx) * 0.15;
  }

  // passos + poeira ao correr
  if (player.onGround && ax !== 0) {
    player.stepT += Math.abs(player.vx);
    if (player.stepT >= 22) { player.stepT = 0; SFX.step(); }
    if (frameCount % 8 === 0) {
      particles.push({ type:'dust', x: player.x + player.w/2 - player.facing*10, y: player.y + player.h - 2, vy: -0.6, t: 0 });
    }
  } else { player.stepT = 12; }

  collectCoinsAround();

  // caiu na água / buraco
  if (player.y > ROWS * TS + 20) loseLife();

  if (player.inv > 0) player.inv--;

  // --- bandeira / fim de fase ---
  if (player.x + player.w/2 >= FLAG_COL * TS) {
    flagReached = true;
    score += Math.max(0, timeLeft) * 10 + 1000;
    SFX.win();
  }

  // --- inimigos ---
  enemies.forEach(function(en){
    if (!en.alive) { en.squash++; return; }
    if (Math.abs(en.x - player.x) > GW * 0.75 && en.x > camX + GW) return; // dorme fora da tela à direita
    en.walkT += 0.1;
    en.hitWall = 0;
    // não cair da borda de plataformas flutuantes: vira ao detectar vazio à frente
    var aheadC = Math.floor((en.x + (en.vx > 0 ? en.w + 2 : -2)) / TS);
    var footR = Math.floor((en.y + en.h + 2) / TS);
    if (en.onGround && !isSolid(tileAt(aheadC, footR))) en.vx = -en.vx;
    en.vy = Math.min(en.vy + GRAV, MAXFALL);
    moveAndCollide(en);
    if (en.hitWall) en.vx = en.hitWall > 0 ? -Math.abs(en.vx) : Math.abs(en.vx);
    if (en.y > ROWS * TS + 40) en.alive = false;

    // colisão com o jogador
    if (rectsOverlap(player, en)) {
      var stomping = player.vy > 0 && (player.y + player.h) < (en.y + en.h * 0.6);
      if (stomping) {
        en.alive = false; en.squash = 0;
        player.vy = jumpHeld ? -11 : -8.5;   // pulo mais alto se segurar (bounce)
        player.sx = 1.35; player.sy = 0.7;
        score += 200;
        SFX.stomp();
        addShake(3.5, 10);
        popups.push({ x: en.x + en.w/2, y: en.y - 6, txt: '+200', t: 0 });
        // explosão de estrelinhas e poeira ao amassar
        var ex = en.x + en.w/2, ey = en.y + en.h/2;
        for (var k = 0; k < 8; k++) {
          var ang = (k / 8) * Math.PI * 2;
          particles.push({ type:'star', x: ex, y: ey, vx: Math.cos(ang)*(1.6+Math.random()), vy: Math.sin(ang)*(1.6+Math.random()) - 1, t: 0, rot: Math.random()*6 });
        }
        for (var kd = 0; kd < 5; kd++) particles.push({ type:'dust', x: ex + (Math.random()-0.5)*20, y: en.y + en.h - 2, vy: -0.6 - Math.random(), t: 0 });
      } else {
        hurtPlayer();
      }
    }
  });
  enemies = enemies.filter(function(en){ return en.alive || en.squash < 30; });

  // --- plantas carnívoras ---
  plants.forEach(function(pl){
    pl.t += 0.02;
    var phase = (Math.sin(pl.t) + 1) / 2;  // 0..1
    pl.out = Math.max(0, phase * 1.4 - 0.4); // fica um tempo escondida
    if (pl.out > 0.15) {
      var ph = 40 * pl.out;
      var box = { x: pl.x - 12, y: pl.topY - ph, w: 24, h: ph };
      if (rectsOverlap(player, box)) hurtPlayer();
    }
  });

  // --- power-ups (cogumelo / flor) ---
  powerups.forEach(function(pu){
    if (pu.rise > 0) { var s = Math.min(1.3, pu.rise); pu.y -= s; pu.rise -= s; }
    else if (pu.kind === 'mush') {
      pu.hitWall = 0;
      pu.vy = Math.min(pu.vy + GRAV, MAXFALL);
      moveAndCollide(pu);
      if (pu.hitWall) pu.vx = -pu.vx;
      if (pu.vx === 0) pu.vx = 1.2;
      if (pu.y > ROWS*TS + 40) pu.dead = true;
    } else { pu.t++; }  // flor fica parada balançando
    if (!pu.dead && rectsOverlap(player, pu)) { pu.dead = true; growPlayer(); }
  });
  powerups = powerups.filter(function(p){ return !p.dead; });

  // --- bolas de fogo ---
  fireballs.forEach(function(fb){
    fb.life--; fb.rot += 0.4;
    fb.vy = Math.min(fb.vy + 0.4, 10);
    fb.hitWall = 0;
    moveAndCollide(fb);
    if (fb.hitWall) fb.dead = true;
    if (fb.onGround) fb.vy = -5.5;       // quica no chão
    if (fb.life <= 0 || fb.y > ROWS*TS) fb.dead = true;
    enemies.forEach(function(en){
      if (en.alive && rectsOverlap(fb, en)) {
        en.alive = false; en.squash = 0; fb.dead = true;
        score += 200;
        addStars(en.x + en.w/2, en.y + en.h/2, 6);
        popups.push({ x: en.x + en.w/2, y: en.y - 6, txt: '+200', t: 0 });
        SFX.stomp();
      }
    });
  });
  fireballs = fireballs.filter(function(f){ return !f.dead; });

  // --- molas: relaxa a compressão ---
  springs.forEach(function(s){ if (s.comp > 0) s.comp--; });

  // --- partículas e popups ---
  particles.forEach(function(p){
    p.t++;
    if (p.vx) p.x += p.vx;
    p.y += p.vy;
    p.vy += (p.type === 'star') ? 0.18 : 0.3;
    if (p.rot != null) p.rot += 0.2;
  });
  particles = particles.filter(function(p){ return p.t < (p.type === 'star' ? 46 : 40); });
  popups.forEach(function(p){ p.t++; p.y -= 0.8; });
  popups = popups.filter(function(p){ return p.t < 50; });

  // --- tremor de tela ---
  if (shakeT > 0) { shakeT--; shakeMag *= 0.85; }
  else shakeMag = 0;

  // --- câmera ---
  var target = player.x - GW * 0.38;
  camX += (target - camX) * 0.12;
  camX = Math.max(0, Math.min(camX, worldEndX - GW));
}

// ---------- Desenho ----------
function rr(x, y, w, h, r) { // rounded rect path
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r);
  ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
}

function drawSky() {
  var g = ctx.createLinearGradient(0, 0, 0, GH);
  g.addColorStop(0, '#2e7fd0');
  g.addColorStop(0.55, '#5db8ea');
  g.addColorStop(1, '#a8dff5');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, GW, GH);
}

function drawCloud(x, y, s) {
  ctx.fillStyle = 'rgba(255,255,255,0.95)';
  ctx.beginPath();
  ctx.arc(x, y, 22*s, 0, 7);
  ctx.arc(x + 24*s, y - 10*s, 26*s, 0, 7);
  ctx.arc(x + 52*s, y, 22*s, 0, 7);
  ctx.fill();
  ctx.fillStyle = 'rgba(220,238,250,0.9)';
  ctx.beginPath();
  ctx.arc(x + 10*s, y + 8*s, 20*s, 0, 7);
  ctx.arc(x + 40*s, y + 8*s, 20*s, 0, 7);
  ctx.fill();
}

function drawCorcovado(px) {
  // montanha do Corcovado com o Cristo Redentor
  var bx = 620 - px, by = 420;
  ctx.save();
  // montanha
  var g = ctx.createLinearGradient(bx, 130, bx, by);
  g.addColorStop(0, '#8a9199');
  g.addColorStop(0.35, '#6e7a72');
  g.addColorStop(1, '#3f5e40');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.moveTo(bx - 190, by);
  ctx.bezierCurveTo(bx - 120, by - 120, bx - 90, by - 190, bx - 30, by - 230);
  ctx.lineTo(bx + 30, by - 230);
  ctx.bezierCurveTo(bx + 100, by - 170, bx + 150, by - 90, bx + 210, by);
  ctx.closePath();
  ctx.fill();
  // vegetação na encosta
  ctx.fillStyle = 'rgba(46,110,52,0.75)';
  for (var i = 0; i < 7; i++) {
    var vx = bx - 150 + i * 48, vy = by - 20 - Math.abs(3 - i) * -14 - 30;
    ctx.beginPath(); ctx.arc(vx, vy + 40, 34, 0, 7); ctx.fill();
  }
  // pedestal
  ctx.fillStyle = '#b9bec4';
  ctx.fillRect(bx - 10, by - 252, 20, 24);
  // Cristo Redentor (silhueta clara)
  ctx.fillStyle = '#dfe4e8';
  ctx.fillRect(bx - 5, by - 296, 10, 46);        // corpo
  ctx.fillRect(bx - 34, by - 288, 68, 7);        // braços abertos
  ctx.beginPath(); ctx.arc(bx, by - 300, 6, 0, 7); ctx.fill(); // cabeça
  ctx.restore();
}

function drawJungleBlob(x, y, r, tone) {
  // "morros" arredondados de floresta com padrão zigue-zague, como na arte
  var light = tone === 0 ? '#5ecb62' : (tone === 1 ? '#46b558' : '#37a04c');
  var dark  = tone === 0 ? '#3f9e4b' : (tone === 1 ? '#2f8a44' : '#25763a');
  ctx.fillStyle = light;
  ctx.beginPath();
  ctx.arc(x, y, r, Math.PI, 0);
  ctx.lineTo(x + r, y + r);
  ctx.lineTo(x - r, y + r);
  ctx.closePath();
  ctx.fill();
  // zigue-zague
  ctx.strokeStyle = dark;
  ctx.lineWidth = Math.max(3, r * 0.09);
  for (var band = 0; band < 3; band++) {
    var by = y - r * 0.55 + band * r * 0.42;
    ctx.beginPath();
    var half = Math.sqrt(Math.max(0, r*r - Math.pow(by - y, 2))) * 0.92;
    var zx = x - half;
    var up = true;
    ctx.moveTo(zx, by);
    while (zx < x + half) {
      zx += r * 0.18;
      ctx.lineTo(Math.min(zx, x + half), by + (up ? -r*0.08 : r*0.08));
      up = !up;
    }
    ctx.stroke();
  }
}

  ctx.beginPath(); ctx.moveTo(bx + 76, by - 116); ctx.lineTo(bx + 97, by - 154); ctx.lineTo(bx + 118, by - 116); ctx.closePath(); ctx.fill();

// Catedral Santo Antônio de Chapecó (duas torres, faixas vermelhas)
function drawCatedral(px) {
  var bx = 600 - px, by = 452;
  ctx.save();
  function tower(tx) {
    ctx.fillStyle = '#f3ede2';
    ctx.fillRect(tx, by - 150, 34, 150);
    // faixas/cantos vermelhos
    ctx.fillStyle = '#b5482c';
    ctx.fillRect(tx, by - 150, 5, 150);
    ctx.fillRect(tx + 29, by - 150, 5, 150);
    // janelas em arco
    ctx.fillStyle = '#7a4a34';
    for (var w = 0; w < 3; w++) {
      var wy = by - 130 + w * 34;
      ctx.beginPath(); ctx.moveTo(tx + 10, wy + 12); ctx.lineTo(tx + 10, wy + 4);
      ctx.arc(tx + 17, wy + 4, 7, Math.PI, 0); ctx.lineTo(tx + 24, wy + 12); ctx.closePath(); ctx.fill();
    }
    // pináculo cônico
    ctx.fillStyle = '#e9e2d6';
    ctx.beginPath(); ctx.moveTo(tx - 3, by - 150); ctx.lineTo(tx + 17, by - 196); ctx.lineTo(tx + 37, by - 150); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#b5482c';
    ctx.beginPath(); ctx.moveTo(tx + 8, by - 168); ctx.lineTo(tx + 17, by - 196); ctx.lineTo(tx + 26, by - 168); ctx.closePath(); ctx.fill();
    // cruz
    ctx.strokeStyle = '#3a3f46'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(tx + 17, by - 196); ctx.lineTo(tx + 17, by - 210);
    ctx.moveTo(tx + 12, by - 205); ctx.lineTo(tx + 22, by - 205); ctx.stroke();
  }
  // corpo central
  ctx.fillStyle = '#f3ede2';
  ctx.fillRect(bx + 30, by - 118, 72, 118);
  // frontão + rosácea
  ctx.fillStyle = '#e9e2d6';
  ctx.beginPath(); ctx.moveTo(bx + 30, by - 118); ctx.lineTo(bx + 66, by - 150); ctx.lineTo(bx + 102, by - 118); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#b5482c';
  ctx.beginPath(); ctx.arc(bx + 66, by - 78, 13, 0, 7); ctx.fill();
  ctx.fillStyle = '#f3ede2';
  ctx.beginPath(); ctx.arc(bx + 66, by - 78, 8, 0, 7); ctx.fill();
  // portão em arco
  ctx.fillStyle = '#7a4a34';
  ctx.beginPath(); ctx.moveTo(bx + 56, by); ctx.lineTo(bx + 56, by - 30); ctx.arc(bx + 66, by - 30, 10, Math.PI, 0); ctx.lineTo(bx + 76, by); ctx.closePath(); ctx.fill();
  tower(bx);
  tower(bx + 96);
  // relógio na torre esquerda
  ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(bx + 17, by - 96, 7, 0, 7); ctx.fill();
  ctx.strokeStyle = '#333'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(bx + 17, by - 96, 7, 0, 7); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(bx + 17, by - 96); ctx.lineTo(bx + 17, by - 100); ctx.moveTo(bx + 17, by - 96); ctx.lineTo(bx + 20, by - 96); ctx.stroke();
  ctx.restore();
}

// prédios da avenida (skyline urbano)
function drawBuildings(px, baseY) {
  var seed = [70,110,90,140,60,120,100,80,130,95];
  for (var i = 0; i < 14; i++) {
    var bx = ((i * 96 - px) % (GW + 480));
    if (bx < -140) bx += GW + 480;
    bx -= 140;
    var h = seed[i % seed.length] + (i % 3) * 14;
    var w = 58 + (i % 3) * 10;
    var tone = i % 3;
    ctx.fillStyle = tone === 0 ? '#8fa6bd' : (tone === 1 ? '#a7b7c6' : '#7d94ab');
    ctx.fillRect(bx, baseY - h, w, h);
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.fillRect(bx, baseY - h, w, 4);
    // janelas
    ctx.fillStyle = 'rgba(40,60,85,0.55)';
    for (var wy = baseY - h + 10; wy < baseY - 8; wy += 14) {
      for (var wx = bx + 6; wx < bx + w - 8; wx += 12) {
        if ((wx + wy) % 3 !== 0) ctx.fillRect(wx, wy, 7, 8);
      }
    }
  }
}

// ipê-rosa (árvore florida característica de Chapecó)
function drawIpe(x, groundY, s) {
  ctx.save();
  ctx.translate(x, groundY);
  ctx.scale(s, s);
  ctx.strokeStyle = '#6b4a2b'; ctx.lineWidth = 6; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -40);
  ctx.moveTo(0, -26); ctx.lineTo(-14, -44); ctx.moveTo(0, -30); ctx.lineTo(15, -46);
  ctx.stroke();
  // copa de flores rosa
  var blobs = [[-14,-52,16],[14,-54,16],[0,-64,20],[-8,-44,12],[10,-44,12]];
  for (var i = 0; i < blobs.length; i++) {
    ctx.fillStyle = i % 2 ? '#e86ba8' : '#f28fc0';
    ctx.beginPath(); ctx.arc(blobs[i][0], blobs[i][1], blobs[i][2], 0, 7); ctx.fill();
  }
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.beginPath(); ctx.arc(-4, -68, 7, 0, 7); ctx.fill();
  ctx.restore();
}

function drawBackground() {
  if (currentLevel === 2) { drawBackgroundChapeco(); return; }
  drawSky();
  drawSun();
  var p1 = camX * 0.15, p2 = camX * 0.3, p3 = camX * 0.5;
  // nuvens
  for (var i = 0; i < 8; i++) {
    var cx = ((i * 340 + 80 - p1) % (GW + 400)) - 150;
    drawCloud(cx, 60 + (i % 3) * 42, 0.8 + (i % 3) * 0.25);
  }
  drawCorcovado(p2 % 1600);
  drawCorcovado((p2 % 1600) - 1600);
  drawCastleBg((p2 % 1600));
  drawCastleBg((p2 % 1600) - 1600);
  // névoa atmosférica na linha do horizonte (profundidade)
  var hz = ctx.createLinearGradient(0, 300, 0, 470);
  hz.addColorStop(0, 'rgba(205,228,245,0)');
  hz.addColorStop(1, 'rgba(205,228,245,0.5)');
  ctx.fillStyle = hz;
  ctx.fillRect(0, 300, GW, 170);
  // morros de floresta (camada mais próxima)
  for (var j = 0; j < 12; j++) {
    var bx = ((j * 260 - p3) % (GW + 520));
    if (bx < -260) bx += GW + 520;
    bx -= 130;
    drawJungleBlob(bx, 470, 90 + (j % 3) * 30, j % 3);

  var hz2 = ctx.createLinearGradient(0, 360, 0, 480);
  hz2.addColorStop(0, 'rgba(210,232,246,0)');
  hz2.addColorStop(1, 'rgba(210,232,246,0.22)');
  ctx.fillStyle = hz2;
  ctx.fillRect(0, 360, GW, 120);
}

function drawBackgroundChapeco() {
  drawSkyChapeco();
  drawSun();
  var p1 = camX * 0.15, p2 = camX * 0.3, p3 = camX * 0.5, p4 = camX * 0.62;
  // nuvens
  for (var i = 0; i < 7; i++) {
    var cx = ((i * 360 + 60 - p1) % (GW + 400)) - 150;
    drawCloud(cx, 50 + (i % 3) * 38, 0.7 + (i % 3) * 0.25);
  }
  // skyline distante
  drawBuildings(p2, 470);
  // catedral como marco central (repete)
  drawCatedral(p3 % 1700);
  drawCatedral((p3 % 1700) - 1700);
  // névoa de profundidade
  var hz = ctx.createLinearGradient(0, 300, 0, 470);
  hz.addColorStop(0, 'rgba(210,230,246,0)');
  hz.addColorStop(1, 'rgba(210,230,246,0.5)');
  ctx.fillStyle = hz;
  ctx.fillRect(0, 300, GW, 170);
  // fileira de ipês-rosa na frente
  for (var j = 0; j < 10; j++) {
    var bx = ((j * 300 - p4) % (GW + 600));
    if (bx < -300) bx += GW + 600;
    bx -= 150;
    drawIpe(bx, 468, 1.0 + (j % 3) * 0.28);
