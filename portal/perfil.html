<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Perfil — RedModel 18+</title>
  <link rel="stylesheet" href="estilo.css" />
</head>
<body>

  <!-- Age gate (caso alguém abra o perfil direto pelo link) -->
  <div class="agegate" id="agegate">
    <div class="agegate-box">
      <div class="mark">18+</div>
      <h2>Conteúdo adulto</h2>
      <p>
        Este site contém material destinado exclusivamente a maiores de 18 anos.
        Ao entrar, você declara ser maior de idade.
      </p>
      <div class="agegate-actions">
        <button class="btn-enter" id="btnEntrar">Tenho 18 anos ou mais — Entrar</button>
        <button class="btn-leave" id="btnSair">Sair</button>
      </div>
    </div>
  </div>

  <header class="topbar">
    <div class="topbar-inner">
      <a href="index.html" class="logo"><b>Red</b>Model <span>18+</span></a>
    </div>
  </header>

  <main class="container">
    <a href="index.html" class="voltar">← Voltar aos anúncios</a>
    <div id="perfil"></div>
  </main>

  <footer>
    <div class="container">
      <div><strong>RedModel</strong> — demonstração de layout. Anúncio fictício.</div>
      <div><span class="aviso18">Conteúdo 18+</span></div>
    </div>
  </footer>

  <script src="dados.js"></script>
  <script src="comum.js"></script>
  <script src="perfil.js"></script>
</body>
</html>
